<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — Debug</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="nexus-auth.js"></script>
<style>
  :root{
    --bg:#0B0F14; --panel:#141B22; --panel-raised:#1A222C; --hairline:#242E38;
    --text:#EDF1F5; --text-mid:#8A96A5; --text-dim:#57626F;
    --green:#34D399; --green-dim:#153629;
    --amber:#F5A623; --amber-dim:#3A2E14;
    --red:#F0575A; --red-dim:#3A1D1F;
    --cyan:#4FC3D9;
    --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:var(--bg); font-family:var(--sans); color:var(--text);}
  body{display:flex; justify-content:center; min-height:100vh;}
  .phone{width:100%; max-width:460px; min-height:100vh; display:flex; flex-direction:column; border-left:1px solid var(--hairline); border-right:1px solid var(--hairline);}

  .header{padding:20px 20px 14px; position:relative;}
  .menu-btn{
    position:absolute; top:18px; right:18px; display:flex; align-items:center; gap:6px;
    font-family:var(--mono); font-size:10.5px; font-weight:600; letter-spacing:0.03em; text-transform:uppercase;
    color:var(--cyan); background:rgba(79,195,217,0.1); border:1px solid rgba(79,195,217,0.3);
    border-radius:20px; padding:7px 12px; text-decoration:none; white-space:nowrap; z-index:5;
  }
  .eyebrow{font-family:var(--mono); font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--amber);}
  .title{font-size:20px; font-weight:600; margin-top:4px;}
  .subtitle{font-family:var(--mono); font-size:10.5px; color:var(--text-dim); margin-top:4px;}
  .divider{height:1px; background:var(--hairline); margin:0 20px;}

  .section{padding:16px 20px;}
  .card{background:var(--panel); border:1px solid var(--hairline); border-radius:12px; padding:18px; margin-bottom:14px;}
  .card.danger{border-color:rgba(240,87,90,0.35);}
  .section-label{font-family:var(--mono); font-size:10.5px; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-dim); margin-bottom:12px; display:flex; align-items:center; gap:8px;}
  .section-label::after{content:''; flex:1; height:1px; background:var(--hairline);}

  .field{margin-bottom:12px;}
  .field label{font-family:var(--mono); font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.04em; display:block; margin-bottom:5px;}
  .field input{
    width:100%; background:var(--panel-raised); border:1px solid var(--hairline); border-radius:8px;
    padding:11px 12px; color:var(--text); font-family:var(--sans); font-size:14px;
  }

  .btn{width:100%; padding:12px; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; margin-top:4px;}
  .btn-primary{background:var(--cyan); color:#04141a;}
  .btn-danger{background:transparent; color:var(--red); border:1px solid var(--red);}
  .btn:disabled{opacity:0.35; cursor:not-allowed;}

  .msg{font-size:12px; margin-top:12px; padding:10px; border-radius:8px; text-align:center; display:none;}
  .msg.ok{background:var(--green-dim); color:var(--green); display:block;}
  .msg.err{background:var(--red-dim); color:var(--red); display:block;}

  .kv-row{display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--hairline); font-size:12px;}
  .kv-row:last-child{border-bottom:none;}
  .kv-key{color:var(--text-mid); font-family:var(--mono); font-size:11px;}
  .kv-val{font-family:var(--mono); color:var(--text);}
  .kv-names{font-size:10.5px; color:var(--text-dim); margin-top:2px;}

  .note{font-size:11px; color:var(--text-dim); line-height:1.6; margin-top:10px;}
  .locked{padding:60px 20px; text-align:center; color:var(--text-dim); font-size:13px;}
  .loading{padding:60px 20px; text-align:center; color:var(--text-dim); font-size:13px;}

  footer{margin-top:auto; padding:16px 20px 24px; font-family:var(--mono); font-size:10px; color:var(--text-dim); text-align:center; border-top:1px solid var(--hairline);}
</style>
</head>
<body>
<div class="phone">
  <div class="header">
    <a href="NEXUS-App-v1.html" class="menu-btn">☰ Menu</a>
    <div class="eyebrow">NEXUS · Écran technique</div>
    <div class="title">🛠 Debug — Données locales</div>
    <div class="subtitle">Non listé dans le menu — accessible uniquement par cette URL</div>
  </div>
  <div class="divider"></div>

  <div class="section" id="root">
    <div class="loading">Chargement…</div>
  </div>

  <footer>NEXUS Debug v1 · Agit uniquement sur cet appareil, jamais sur Supabase</footer>
</div>

<script>
  // Compare sans tenir compte des accents/majuscules — "Frédéric", "Frederic",
  // "FREDERIC" doivent tous matcher la meme entree.
  function normaliser(s) {
    return (s || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim().toLowerCase();
  }

  function etatLocalStorage() {
    const retards = JSON.parse(localStorage.getItem('nexus_retards') || '{}');
    const pointages = JSON.parse(localStorage.getItem('nexus_pointages') || '{}');
    const validees = JSON.parse(localStorage.getItem('nexus_recommandations_validees') || '[]');
    const journal = JSON.parse(localStorage.getItem('nexus_journal_decisions') || '[]');

    const nomsRetards = Object.keys(retards);
    const nomsPointages = new Set();
    Object.values(pointages).forEach(jour => Object.keys(jour).forEach(n => nomsPointages.add(n)));

    return { retards, pointages, validees, journal, nomsRetards, nomsPointages: [...nomsPointages] };
  }

  // Migration ponctuelle — reprend l'historique local (nexus_pointages) et
  // l'insere dans Supabase (pointages). Concue pour etre relancee sans risque :
  // toute entree deja presente (meme employe + date + type + heure) est ignoree.
  async function migrerPointagesVersSupabase() {
    const msg = document.getElementById('msgMigration');
    const btn = document.getElementById('btnMigrer');
    msg.className = 'msg'; msg.textContent = '';

    const pointagesLocal = JSON.parse(localStorage.getItem('nexus_pointages') || '{}');
    const dates = Object.keys(pointagesLocal);
    if (dates.length === 0) {
      msg.textContent = 'Aucun historique de pointage trouvé sur cet appareil.';
      msg.className = 'msg err';
      return;
    }

    if (!confirm(`Cet appareil contient des pointages sur ${dates.length} jour(s). Lancer la migration vers Supabase ?`)) return;

    btn.disabled = true; btn.textContent = 'Migration en cours…';

    const { data: employesData, error: erreurEmployes } = await nexusClient.from('employees').select('id, nom');
    if (erreurEmployes) {
      console.error('Chargement employees:', erreurEmployes);
      msg.textContent = 'Erreur de chargement des employés — réessayez.';
      msg.className = 'msg err';
      btn.disabled = false; btn.textContent = 'Lancer la migration';
      return;
    }
    const idParNom = {};
    (employesData || []).forEach(e => { idParNom[normaliser(e.nom)] = e.id; });

    const aInserer = [];
    const nomsNonReconnus = new Set();
    dates.forEach(date => {
      const parEmploye = pointagesLocal[date] || {};
      Object.keys(parEmploye).forEach(nom => {
        const empId = idParNom[normaliser(nom)];
        if (!empId) { nomsNonReconnus.add(nom); return; }
        (parEmploye[nom] || []).forEach(p => {
          aInserer.push({
            employee_id: empId, site: 'vito-sainte-marie', date,
            type: p.type, heure: p.heure, quart: p.quart || 'inconnu', retard_min: p.retard_min || 0,
          });
        });
      });
    });

    if (aInserer.length === 0) {
      msg.textContent = nomsNonReconnus.size
        ? `Aucune entrée migrable — noms non reconnus dans Supabase : ${[...nomsNonReconnus].join(', ')}.`
        : 'Rien à migrer.';
      msg.className = 'msg err';
      btn.disabled = false; btn.textContent = 'Lancer la migration';
      return;
    }

    // Detection des doublons — indispensable si la migration est relancee
    const idsConcernes = [...new Set(aInserer.map(e => e.employee_id))];
    const { data: dejaPresent, error: erreurExistant } = await nexusClient
      .from('pointages').select('employee_id, date, type, heure').in('employee_id', idsConcernes);
    if (erreurExistant) console.error('Vérification doublons:', erreurExistant);
    const cleExistante = new Set((dejaPresent || []).map(p => `${p.employee_id}|${p.date}|${p.type}|${p.heure}`));
    const nouveauxSeuls = aInserer.filter(e => !cleExistante.has(`${e.employee_id}|${e.date}|${e.type}|${e.heure}`));
    const doublons = aInserer.length - nouveauxSeuls.length;

    if (nouveauxSeuls.length === 0) {
      msg.textContent = `Tout est déjà présent dans Supabase (${doublons} entrée(s) déjà migrées). Rien à faire.`;
      msg.className = 'msg ok';
      btn.disabled = false; btn.textContent = 'Lancer la migration';
      return;
    }

    let inseres = 0, erreurs = 0;
    for (let i = 0; i < nouveauxSeuls.length; i += 200) {
      const lot = nouveauxSeuls.slice(i, i + 200);
      const { error } = await nexusClient.from('pointages').insert(lot);
      if (error) { console.error('Insertion migration:', error); erreurs += lot.length; }
      else inseres += lot.length;
    }

    btn.disabled = false; btn.textContent = 'Lancer la migration';

    let resume = `✓ ${inseres} pointage(s) migré(s) vers Supabase.`;
    if (doublons > 0) resume += ` ${doublons} déjà présents, ignorés.`;
    if (erreurs > 0) resume += ` ${erreurs} en erreur (voir la console).`;
    if (nomsNonReconnus.size > 0) resume += ` Noms non reconnus, non migrés : ${[...nomsNonReconnus].join(', ')}.`;

    msg.textContent = resume;
    msg.className = erreurs > 0 ? 'msg err' : 'msg ok';
    renderRoot();
  }

  // Correction ponctuelle — les futurs imports classent deja correctement
  // les produits CBD (voir NEXUS-Import-v1.html, corrigerCategorie()), mais
  // ce qui a ete importe AVANT cette correction reste mal classe en base
  // tant que personne ne le corrige explicitement. Rejouable sans risque :
  // une fois toutes les lignes reclassees, il n'y a plus rien a corriger.
  async function corrigerCategoriesCBD() {
    const msg = document.getElementById('msgCBD');
    const btn = document.getElementById('btnCorrigerCBD');
    msg.className = 'msg'; msg.textContent = '';

    const { data: lignesConcernees, error: erreurRecherche } = await nexusClient
      .from('products')
      .select('categorie, article')
      .eq('site', 'vito-sainte-marie')
      .ilike('article', '%cbd%')
      .neq('categorie', 'CBD');

    if (erreurRecherche) {
      console.error('Recherche CBD:', erreurRecherche);
      msg.textContent = 'Erreur de recherche — réessayez.';
      msg.className = 'msg err';
      return;
    }

    if (!lignesConcernees || lignesConcernees.length === 0) {
      msg.textContent = 'Rien à corriger — toutes les lignes CBD sont déjà classées correctement.';
      msg.className = 'msg ok';
      return;
    }

    const categoriesActuelles = [...new Set(lignesConcernees.map(l => l.categorie))].join(', ');
    if (!confirm(`${lignesConcernees.length} ligne(s) contenant "CBD" sont actuellement classées sous : ${categoriesActuelles}. Les reclasser sous "CBD" ?`)) return;

    btn.disabled = true; btn.textContent = 'Correction en cours…';

    const { error: erreurMaj } = await nexusClient
      .from('products')
      .update({ categorie: 'CBD' })
      .eq('site', 'vito-sainte-marie')
      .ilike('article', '%cbd%')
      .neq('categorie', 'CBD');

    btn.disabled = false; btn.textContent = 'Corriger les catégories CBD';

    if (erreurMaj) {
      console.error('Correction CBD:', erreurMaj);
      msg.textContent = 'Erreur lors de la correction — réessayez.';
      msg.className = 'msg err';
      return;
    }

    msg.textContent = `✓ ${lignesConcernees.length} ligne(s) reclassée(s) sous "CBD".`;
    msg.className = 'msg ok';
  }

  // Diagnostic doublons — compare le nombre total de lignes au nombre
  // d'articles distincts par periode. Un ratio > 1 signifie que des articles
  // apparaissent plusieurs fois pour la meme periode, signe d'un reimport
  // qui a ajoute au lieu de remplacer (avant la correction du 15/07/2026).
  async function diagnostiquerPeriodes() {
    const msg = document.getElementById('msgPeriodes');
    const zone = document.getElementById('resultatPeriodes');
    msg.className = 'msg'; msg.textContent = '';
    zone.innerHTML = '<div class="note">Analyse en cours…</div>';

    const { data, error } = await nexusClient
      .from('products')
      .select('periode_debut, periode_fin, article')
      .eq('site', 'vito-sainte-marie');

    if (error) {
      console.error('Diagnostic périodes:', error);
      zone.innerHTML = '';
      msg.textContent = 'Erreur de chargement — réessayez.';
      msg.className = 'msg err';
      return;
    }

    const parPeriode = {};
    (data || []).forEach(r => {
      const cle = `${r.periode_debut}|${r.periode_fin}`;
      if (!parPeriode[cle]) parPeriode[cle] = { debut: r.periode_debut, fin: r.periode_fin, total: 0, articles: new Set() };
      parPeriode[cle].total += 1;
      parPeriode[cle].articles.add(r.article);
    });

    const periodes = Object.values(parPeriode).map(p => ({
      ...p, distincts: p.articles.size, ratio: p.articles.size > 0 ? p.total / p.articles.size : 0,
    })).sort((a,b) => a.debut.localeCompare(b.debut));

    if (periodes.length === 0) {
      zone.innerHTML = '<div class="empty-note">Aucune donnée dans products pour l\'instant.</div>';
      return;
    }

    zone.innerHTML = periodes.map(p => {
      const suspect = p.ratio >= 1.5;
      return `
        <div class="kv-row" style="flex-direction:column; align-items:stretch; gap:4px; padding:10px 0;">
          <div style="display:flex; justify-content:space-between;">
            <span class="kv-key">${p.debut} → ${p.fin}</span>
            <span class="kv-val" style="color:${suspect?'var(--red)':'var(--green)'};">${p.total} ligne${p.total>1?'s':''} · ${p.distincts} article${p.distincts>1?'s':''} distinct${p.distincts>1?'s':''}${suspect?' ⚠ doublon probable':''}</span>
          </div>
          ${suspect ? `<button class="btn btn-danger" style="margin-top:4px;" data-debut="${p.debut}" data-fin="${p.fin}" onclick="supprimerPeriode(this)">Supprimer cette période (pour réimporter proprement)</button>` : ''}
        </div>`;
    }).join('');

    msg.textContent = `${periodes.length} période(s) analysée(s).`;
    msg.className = 'msg ok';
  }

  async function supprimerPeriode(btn) {
    const debut = btn.dataset.debut, fin = btn.dataset.fin;
    if (!confirm(`Supprimer TOUTES les lignes products de la période ${debut} → ${fin} ? Cette action est irréversible — réimportez ensuite le fichier propre depuis Import.`)) return;
    btn.disabled = true; btn.textContent = 'Suppression…';
    const { error } = await nexusClient.from('products').delete()
      .eq('site', 'vito-sainte-marie').eq('periode_debut', debut).eq('periode_fin', fin);
    if (error) {
      console.error('Suppression période:', error);
      alert('Erreur lors de la suppression — réessayez.');
      btn.disabled = false; btn.textContent = 'Supprimer cette période (pour réimporter proprement)';
      return;
    }
    diagnostiquerPeriodes();
  }

  function renderRoot() {
    const etat = etatLocalStorage();
    const root = document.getElementById('root');
    root.innerHTML = `
      <div class="card">
        <div class="section-label">État actuel — cet appareil</div>
        <div class="kv-row"><span class="kv-key">Employés dans Retards</span><span class="kv-val">${etat.nomsRetards.length}</span></div>
        <div class="kv-names">${etat.nomsRetards.join(', ') || '—'}</div>
        <div class="kv-row" style="margin-top:10px;"><span class="kv-key">Employés dans Pointages</span><span class="kv-val">${etat.nomsPointages.length}</span></div>
        <div class="kv-names">${etat.nomsPointages.join(', ') || '—'}</div>
        <div class="kv-row" style="margin-top:10px;"><span class="kv-key">Décisions validées</span><span class="kv-val">${etat.validees.length}</span></div>
        <div class="kv-row"><span class="kv-key">Entrées Journal</span><span class="kv-val">${etat.journal.length}</span></div>
      </div>

      <div class="card">
        <div class="section-label">Retirer un employé des données locales</div>
        <div class="field">
          <label>Nom (Pointage &amp; Retards uniquement)</label>
          <input type="text" id="nomCible" placeholder="Frédéric">
        </div>
        <button class="btn btn-primary" id="btnNettoyer">Retirer cet employé</button>
        <div class="msg" id="msgNettoyer"></div>
        <div class="note">Ne touche pas à Supabase. N'affecte que Pointage et Retards, stockés uniquement sur cet appareil — Résultats Équipe et Radar du Manager en dépendent pour les retards.</div>
      </div>

      <div class="card">
        <div class="section-label">Migration ponctuelle — Pointage vers Supabase</div>
        <p class="note" style="margin-top:0;">Reprend l'historique local (<code>nexus_pointages</code>) de cet appareil et l'insère dans la table Supabase <code>pointages</code>, en retrouvant chaque employé par son nom. Sans danger à relancer plusieurs fois — les entrées déjà migrées sont détectées et ignorées.</p>
        <button class="btn btn-primary" id="btnMigrer">Lancer la migration</button>
        <div class="msg" id="msgMigration"></div>
      </div>

      <div class="card">
        <div class="section-label">Correction ponctuelle — Catégories CBD</div>
        <p class="note" style="margin-top:0;">Reclasse sous "CBD" toute ligne déjà importée dans <code>products</code> dont l'article contient "CBD" mais qui est encore classée ailleurs (ex : sous "Tabac"). Corrige l'historique déjà en base — les futurs imports sont déjà corrigés automatiquement. Sans danger à relancer plusieurs fois.</p>
        <button class="btn btn-primary" id="btnCorrigerCBD">Corriger les catégories CBD</button>
        <div class="msg" id="msgCBD"></div>
      </div>

      <div class="card">
        <div class="section-label">Diagnostic — Doublons de période (products)</div>
        <p class="note" style="margin-top:0;">L'import ne remplace pas automatiquement une période déjà envoyée (sauf depuis la correction du 15/07/2026) — un réimport avant cette date a pu créer des doublons. Ce diagnostic compte les lignes par période pour repérer un total anormalement élevé.</p>
        <button class="btn btn-primary" id="btnDiagPeriodes">Analyser les périodes</button>
        <div id="resultatPeriodes"></div>
        <div class="msg" id="msgPeriodes"></div>
      </div>

      <div class="card danger">
        <div class="section-label">Zone sensible</div>
        <button class="btn btn-danger" id="btnReset">Réinitialiser toutes les données locales de cet appareil</button>
        <div class="msg" id="msgReset"></div>
        <div class="note">Efface Pointage, Retards, décisions validées et Journal NEXUS sur cet appareil. Ne touche pas à Supabase (employés, missions, produits). Irréversible — deux confirmations demandées.</div>
      </div>
    `;

    document.getElementById('btnMigrer').addEventListener('click', migrerPointagesVersSupabase);
    document.getElementById('btnCorrigerCBD').addEventListener('click', corrigerCategoriesCBD);
    document.getElementById('btnDiagPeriodes').addEventListener('click', diagnostiquerPeriodes);

    document.getElementById('btnNettoyer').addEventListener('click', () => {
      const brut = document.getElementById('nomCible').value;
      const cible = normaliser(brut);
      const msg = document.getElementById('msgNettoyer');
      if (!cible) {
        msg.textContent = 'Entrez un nom.'; msg.className = 'msg err';
        return;
      }

      const retards = JSON.parse(localStorage.getItem('nexus_retards') || '{}');
      const pointages = JSON.parse(localStorage.getItem('nexus_pointages') || '{}');

      let touche = false;
      Object.keys(retards).forEach(nom => { if (normaliser(nom) === cible) { delete retards[nom]; touche = true; } });
      Object.keys(pointages).forEach(date => {
        Object.keys(pointages[date]).forEach(nom => { if (normaliser(nom) === cible) { delete pointages[date][nom]; touche = true; } });
      });

      if (!touche) {
        msg.textContent = `Aucune entrée trouvée pour "${brut}".`; msg.className = 'msg err';
        return;
      }

      localStorage.setItem('nexus_retards', JSON.stringify(retards));
      localStorage.setItem('nexus_pointages', JSON.stringify(pointages));
      msg.textContent = `"${brut}" retiré des Retards et Pointages de cet appareil.`; msg.className = 'msg ok';
      renderRoot();
    });

    document.getElementById('btnReset').addEventListener('click', () => {
      if (!confirm('Effacer Pointage, Retards, décisions validées et Journal NEXUS sur cet appareil ?')) return;
      if (!confirm('Confirmation finale — cette action est irréversible sur cet appareil. Continuer ?')) return;
      ['nexus_retards', 'nexus_pointages', 'nexus_recommandations_validees', 'nexus_journal_decisions'].forEach(k => localStorage.removeItem(k));
      const msg = document.getElementById('msgReset');
      msg.textContent = 'Données locales réinitialisées.'; msg.className = 'msg ok';
      renderRoot();
    });
  }

  nexusRequireAuth().then(employee => {
    if (!employee) return; // nexus-auth.js gère déjà la redirection vers NEXUS-Login-v1.html
    if (employee.role !== 'manager' && employee.role !== 'gerant') {
      document.getElementById('root').innerHTML = `<div class="locked">Cet écran est réservé aux managers.</div>`;
      return;
    }
    renderRoot();
  });
</script>
</body>
</html>

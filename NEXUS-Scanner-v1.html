<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — Scanner NEXUS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B0F14; --panel:#141B22; --panel-raised:#1A222C; --hairline:#242E38;
  --text:#EDF1F5; --text-mid:#8A96A5; --text-dim:#57626F;
  --green:#34D399; --green-dim:#153629;
  --amber:#F5A623; --amber-dim:#3A2E14;
  --cyan:#4FC3D9; --cyan-dim:#123138;
  --violet:#8B7FE8; --violet-dim:#241F3D;
  --red:#F0575A; --red-dim:#3A1D1F;
  --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{background:var(--bg); font-family:var(--sans); color:var(--text); min-height:100vh;}
body{display:flex; justify-content:center; background-image:radial-gradient(circle at 50% 0%, rgba(79,195,217,0.07), transparent 45%);}
a{color:inherit; text-decoration:none;}

.app{width:100%; max-width:520px; min-height:100vh; display:flex; flex-direction:column; border-left:1px solid var(--hairline); border-right:1px solid var(--hairline); padding-bottom:78px; position:relative;}

.topbar{display:flex; align-items:center; justify-content:space-between; padding:20px 20px 16px;}
.icon-btn{width:38px; height:38px; border-radius:10px; background:var(--panel); border:1px solid var(--hairline); display:flex; align-items:center; justify-content:center; font-size:16px; color:var(--text-mid); flex-shrink:0;}
.topbar-title{text-align:center; flex:1;}
.topbar-title h1{font-size:19px; font-weight:600;}
.topbar-title p{font-family:var(--mono); font-size:11px; color:var(--text-mid); margin-top:2px; letter-spacing:0.02em;}
.topbar-actions{display:flex; gap:8px;}

.section{padding:0 20px;}
.section-label{
  font-family:var(--mono); font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-dim);
  display:flex; align-items:center; gap:10px; margin:26px 0 12px;
}
.section-label::after{content:''; flex:1; height:1px; background:var(--hairline);}
.section-label .link{color:var(--cyan); text-transform:none; letter-spacing:0; font-size:12px; margin-left:auto; flex:none;}

.capital-panel{
  background:var(--panel); border:1px solid var(--hairline); border-radius:16px; padding:22px 22px 20px; margin:0 20px;
  position:relative; overflow:hidden;
}
.capital-eyebrow{font-family:var(--mono); font-size:11px; letter-spacing:0.14em; color:var(--green); text-transform:uppercase; display:flex; align-items:center; gap:6px;}
.capital-info{margin-left:auto; width:20px; height:20px; border-radius:50%; border:1px solid var(--hairline); display:flex; align-items:center; justify-content:center; font-size:10px; color:var(--text-dim);}
.capital-row-top{display:flex; align-items:center;}
.capital-amount{font-family:var(--sans); font-size:40px; font-weight:700; color:var(--green); margin-top:10px; letter-spacing:-0.01em;}
.capital-sub{font-size:14px; font-weight:600; margin-top:2px;}
.capital-desc{font-size:12px; color:var(--text-mid); margin-top:8px; line-height:1.5; max-width:78%;}
.capital-badge{
  display:inline-flex; align-items:center; gap:6px; margin-top:16px; font-family:var(--mono); font-size:11.5px;
  background:var(--green-dim); color:var(--green); padding:6px 12px; border-radius:20px; font-weight:600;
}
.data-tag{
  display:inline-flex; align-items:center; gap:6px; margin-top:10px; font-family:var(--mono); font-size:10px;
  background:var(--panel-raised); color:var(--text-dim); padding:4px 10px; border-radius:20px; font-weight:600;
  border:1px solid var(--hairline);
}

.levers-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:10px;}
.lever-card{background:var(--panel); border:1px solid var(--hairline); border-radius:14px; padding:16px; cursor:pointer; transition:border-color .15s;}
.lever-card:active{border-color:rgba(79,195,217,0.4);}
.lever-toggle{font-family:var(--mono); font-size:9.5px; color:var(--cyan); opacity:0.75; margin-top:8px; display:flex; align-items:center; gap:4px;}
.lever-toggle .chev{transition:transform .15s; display:inline-block;}
.lever-card.open .lever-toggle .chev, .mini-panel.open .lever-toggle .chev{transform:rotate(90deg);}
.lever-detail{display:none; margin-top:12px; padding-top:12px; border-top:1px solid var(--hairline);}
.lever-card.open .lever-detail, .mini-panel.open .lever-detail{display:block;}
.detail-row{display:flex; justify-content:space-between; align-items:baseline; padding:5px 0; font-size:11px; gap:8px;}
.detail-row .dn{color:var(--text-mid); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.detail-row .dv{font-family:var(--mono); color:var(--text); flex-shrink:0;}
.detail-empty{font-size:11px; color:var(--text-dim); font-style:italic; padding:4px 0;}
.lever-icon{width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:17px; margin-bottom:12px; font-family:var(--mono); font-weight:700;}
.lever-title{font-size:12.5px; color:var(--text-mid); line-height:1.35; margin-bottom:10px; min-height:34px;}
.lever-amount{font-family:var(--sans); font-size:19px; font-weight:700;}
.lever-meta{font-family:var(--mono); font-size:10.5px; color:var(--text-dim); margin-top:3px;}

.roi-panel{background:var(--panel); border:1px solid var(--hairline); border-radius:16px; padding:24px 18px; display:flex; align-items:center; justify-content:space-between;}
.roi-col{text-align:center; flex:1;}
.roi-label{font-family:var(--mono); font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-mid); margin-bottom:8px;}
.roi-value{font-size:18px; font-weight:700;}
.roi-value.green{color:var(--green);}
.roi-meta{font-size:10.5px; color:var(--text-dim); margin-top:3px;}
.roi-donut{position:relative; width:104px; height:104px; flex:none;}
.roi-donut .center{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;}
.roi-donut .center .roi-tag{font-family:var(--mono); font-size:9px; color:var(--text-mid); letter-spacing:0.08em; text-transform:uppercase;}
.roi-donut .center .roi-pct{font-size:22px; font-weight:700; color:var(--green); margin-top:2px;}

.decision-item{display:flex; align-items:center; gap:14px; padding:14px; background:var(--panel); border:1px solid var(--hairline); border-radius:12px; margin-bottom:10px;}
.decision-rank{width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:11px; font-weight:700; flex-shrink:0;}
.rank-1{background:var(--amber-dim); color:var(--amber);}
.rank-2{background:var(--panel-raised); color:var(--text-mid);}
.rank-3{background:var(--red-dim); color:#D98A85;}
.rank-4{background:var(--cyan-dim); color:var(--cyan);}
.rank-5{background:var(--violet-dim); color:var(--violet);}
.decision-body{flex:1; min-width:0;}
.decision-title{font-size:13.5px; font-weight:600;}
.decision-meta{font-family:var(--mono); font-size:10.5px; color:var(--text-dim); margin-top:2px;}
.decision-amount{font-size:14.5px; font-weight:700; color:var(--green); flex-shrink:0; text-align:right;}

.two-col{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.mini-panel{background:var(--panel); border:1px solid var(--hairline); border-radius:14px; padding:16px;}
.mini-panel.clickable{cursor:pointer; transition:border-color .15s;}
.mini-panel.clickable:active{border-color:rgba(79,195,217,0.4);}
.mini-label{font-family:var(--mono); font-size:9.5px; letter-spacing:0.06em; text-transform:uppercase; color:var(--text-mid); margin-bottom:10px;}
.mini-label.amber{color:var(--amber);}
.opp-number{font-size:30px; font-weight:700; color:var(--amber);}
.opp-desc{font-size:11px; color:var(--text-mid); margin-top:4px; line-height:1.4;}
.opp-potential{font-size:13px; font-weight:600; color:var(--amber); margin-top:10px;}
.bar-row{display:flex; align-items:center; gap:8px; margin-bottom:8px; font-family:var(--mono); font-size:10px;}
.bar-row .bar-label{width:14px; color:var(--text-mid); flex-shrink:0;}
.bar-track{flex:1; height:8px; border-radius:4px; background:var(--hairline); overflow:hidden;}
.bar-fill{height:100%; border-radius:4px;}
.bar-row .bar-val{width:34px; text-align:right; color:var(--text-mid); flex-shrink:0;}

.advisor-panel{display:flex; gap:14px; background:var(--panel); border:1px solid var(--hairline); border-radius:14px; padding:18px;}
.advisor-avatar{width:44px; height:44px; border-radius:50%; background:linear-gradient(135deg, var(--cyan), var(--violet)); display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-weight:700; font-size:15px; color:#06181C; flex-shrink:0;}
.advisor-body .advisor-title{font-family:var(--mono); font-size:10.5px; letter-spacing:0.06em; text-transform:uppercase; color:var(--cyan); margin-bottom:8px;}
.advisor-body p{font-size:13px; line-height:1.55; color:var(--text);}

.empty-panel{background:var(--panel); border:1px dashed var(--hairline); border-radius:14px; padding:22px 20px; text-align:center;}
.empty-panel .ei{font-size:22px; margin-bottom:10px;}
.empty-panel .ei img{width:36px; height:36px; border-radius:10px; object-fit:cover; vertical-align:middle;}
.empty-panel .et{font-size:13.5px; font-weight:600;}
.empty-panel .ed{font-size:12px; color:var(--text-mid); margin-top:6px; line-height:1.5;}
.empty-panel .btn-link{display:inline-block; margin-top:14px; font-family:var(--mono); font-size:11.5px; color:var(--cyan); padding:8px 14px; border:1px solid rgba(79,195,217,0.35); border-radius:8px;}

.disclaimer{font-family:var(--mono); font-size:10px; color:var(--text-dim); text-align:center; line-height:1.6; padding:20px 20px 8px;}
.loading{padding:60px 20px; text-align:center; color:var(--text-dim); font-size:13px;}

.tabbar{
  position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:520px;
  background:rgba(20,27,34,0.95); backdrop-filter:blur(8px); border-top:1px solid var(--hairline);
  display:flex; padding:10px 8px 14px;
}
.tab{flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; position:relative; color:var(--text-dim);}
.tab.active{color:var(--cyan);}
.tab .tab-icon{font-size:19px;}
.tab .tab-label{font-family:var(--mono); font-size:9.5px; letter-spacing:0.02em;}
.tab .tab-dot{position:absolute; top:-2px; right:28%; width:15px; height:15px; border-radius:50%; background:var(--red); color:#fff; font-size:9px; display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-weight:700;}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="nexus-auth.js"></script>

<body>
<div class="app">

  <div class="topbar">
    <a href="NEXUS-App-v1.html" class="icon-btn" style="text-decoration:none;">☰</a>
    <div class="topbar-title">
      <h1>Scanner NEXUS</h1>
      <p id="scanSubtitle">Chargement…</p>
    </div>
    <div class="topbar-actions">
      <div class="icon-btn">📅</div>
      <div class="icon-btn">↗</div>
    </div>
  </div>

  <div id="root">
    <div class="loading">Analyse des données en cours…</div>
  </div>

  <div class="tabbar">
    <a class="tab" href="NEXUS-App-v1.html"><span class="tab-icon">🏠</span><span class="tab-label">Cockpit</span></a>
    <a class="tab" href="NEXUS-Missions-v1.html"><span class="tab-icon">✅</span><span class="tab-label">Actions</span></a>
    <a class="tab" href="NEXUS-Parametres-Rappels-v1.html"><span class="tab-icon">🔔</span><span class="tab-label">Alertes</span><span class="tab-dot">3</span></a>
    <a class="tab active" href="NEXUS-Scanner-v1.html"><span class="tab-icon">🧭</span><span class="tab-label">Scanner</span></a>
    <a class="tab" href="NEXUS-App-v1.html"><span class="tab-icon">▦</span><span class="tab-label">Plus</span></a>
  </div>

</div>

<script>
  // Meme moteur que Cockpit et le CIN : donnees reelles de la table products,
  // exclusion des produits d'appel, periode la plus recente uniquement (cette
  // page decrit l'etat du magasin a un instant T, pas une evolution).
  async function chargerProduitsAppel() {
    const { data, error } = await nexusClient.from('produits_appel').select('article').eq('site', 'vito-sainte-marie');
    if (error) { console.error(error); return new Set(); }
    return new Set((data || []).map(r => r.article));
  }

  async function chargerDonneesScanner() {
    const [{ data, error }, produitsAppel] = await Promise.all([
      nexusClient
        .from('products')
        .select('categorie, article, ca, marge, periode_debut, periode_fin')
        .eq('site', 'vito-sainte-marie')
        .order('periode_debut', { ascending: false }),
      chargerProduitsAppel(),
    ]);
    if (error || !data || !data.length) { console.error('Chargement products:', error); return null; }

    const rowsBrut = data.filter(r => !produitsAppel.has(r.article));
    const periodes = [...new Set(rowsBrut.map(r => r.periode_debut))].sort().reverse();
    const periodeActuelle = periodes[0];
    const rows = rowsBrut.filter(r => r.periode_debut === periodeActuelle);
    const periodeFin = rows.find(r => r.periode_fin)?.periode_fin || periodeActuelle;
    return { rows, periodeDebut: periodeActuelle, periodeFin };
  }

  // Regroupe par categorie, classe en A/B/C par methode Pareto standard
  // (A jusqu'a 80% du CA cumule, B jusqu'a 95%, C le reste) — meme logique
  // que la classification ABC deja utilisee sur NEXUS Pilot.
  function construireStats(rows) {
    // Anomalie = ligne dont le CA ou la marge n'a pas de sens economique
    // (marge negative, marge superieure au CA, ou CA nul/negatif). Detectee
    // AVANT les agregats et exclue de tous les calculs qui suivent — sinon
    // une seule ligne aberrante peut fausser le pourcentage de toute une
    // categorie (corrige le 15/07/2026 : "Tabac 53,7%" venait de la, pas
    // d'une vraie marge).
    const anomalies = rows.filter(r => (r.ca||0) <= 0 || (r.marge||0) < 0 || (r.marge||0) > (r.ca||0));
    const rowsPropres = rows.filter(r => !anomalies.includes(r));

    const caTotal = rowsPropres.reduce((s,r) => s + (r.ca || 0), 0);
    const margeTotal = rowsPropres.reduce((s,r) => s + (r.marge || 0), 0);
    const nbRefs = rows.length;

    const parCategorie = {};
    rowsPropres.forEach(r => {
      if (!parCategorie[r.categorie]) parCategorie[r.categorie] = { categorie: r.categorie, ca: 0, marge: 0 };
      parCategorie[r.categorie].ca += (r.ca || 0);
      parCategorie[r.categorie].marge += (r.marge || 0);
    });
    const catArr = Object.values(parCategorie);
    const nbCategories = catArr.length;

    const parCA = [...catArr].sort((a,b) => b.ca - a.ca);
    let cumul = 0;
    const classes = { A: { n:0, ca:0 }, B: { n:0, ca:0 }, C: { n:0, ca:0 } };
    parCA.forEach(c => {
      cumul += c.ca;
      const pctCumul = caTotal > 0 ? cumul / caTotal : 0;
      const classe = pctCumul <= 0.80 ? 'A' : (pctCumul <= 0.95 ? 'B' : 'C');
      c.classe = classe;
      classes[classe].n += 1;
      classes[classe].ca += c.ca;
    });

    const top5CA = [...catArr].sort((a,b) => b.ca - a.ca).slice(0,5);
    const top5Marge = [...catArr].sort((a,b) => b.marge - a.marge).slice(0,5);

    return { caTotal, margeTotal, nbRefs, nbCategories, classes, top5CA, top5Marge, anomalies, catArr };
  }

  function texteLecture(stats) {
    if (stats.top5CA.length === 0) return "Pas assez de données pour une lecture fiable.";
    const topCA = stats.top5CA[0];
    const topMarge = stats.top5Marge[0];
    const pctCA_A = stats.caTotal > 0 ? (stats.classes.A.ca / stats.caTotal * 100) : 0;

    if (topCA.categorie === topMarge.categorie) {
      return `${topCA.categorie} est à la fois votre première source de chiffre d'affaires et de marge — une catégorie qui mérite une attention prioritaire, dans un sens comme dans l'autre.`;
    }
    const margeTopCA = topCA.ca > 0 ? (topCA.marge / topCA.ca * 100) : 0;
    const margeTopMarge = topMarge.ca > 0 ? (topMarge.marge / topMarge.ca * 100) : 0;
    return `Vos ${stats.classes.A.n} catégorie${stats.classes.A.n>1?'s':''} A pèsent ${fmtPct(pctCA_A)} du chiffre d'affaires. ${topCA.categorie} tire le volume avec une marge de ${fmtPct(margeTopCA)}, alors que ${topMarge.categorie} génère le plus de marge en valeur avec un taux de ${fmtPct(margeTopMarge)}.`;
  }

  function fmtEur(v) { return Math.round(v).toLocaleString('fr-FR') + ' €'; }

  // Deplie/replie une carte au clic — l'ecran reste sobre par defaut, le
  // detail n'apparait que si on le demande explicitement.
  function toggleCard(el) {
    el.classList.toggle('open');
  }

  const LIMITE_DETAIL = 12;

  function renderDetailListe(categories, metric) {
    const tri = [...categories].sort((a,b) => metric === 'margePct'
      ? (b.ca>0 ? b.marge/b.ca : 0) - (a.ca>0 ? a.marge/a.ca : 0)
      : b.ca - a.ca);
    if (tri.length === 0) return '<div class="detail-empty">Aucune catégorie dans ce groupe.</div>';
    const visibles = tri.slice(0, LIMITE_DETAIL);
    const reste = tri.length - visibles.length;
    let html = visibles.map(c => `
      <div class="detail-row">
        <span class="dn">${c.categorie}</span>
        <span class="dv">${metric === 'margePct' ? fmtPct(c.ca>0 ? c.marge/c.ca*100 : 0) : fmtEur(c.ca)}</span>
      </div>`).join('');
    if (reste > 0) html += `<div class="detail-empty">+ ${reste} autre${reste>1?'s':''} catégorie${reste>1?'s':''}</div>`;
    return html;
  }

  function renderDetailAnomalies(anomalies) {
    const visibles = anomalies.slice(0, 15);
    const reste = anomalies.length - visibles.length;
    let html = visibles.map(r => `
      <div class="detail-row">
        <span class="dn">${r.article} <span style="opacity:0.6;">(${r.categorie})</span></span>
        <span class="dv">CA ${fmtEur(r.ca)} · marge ${fmtEur(r.marge)}</span>
      </div>`).join('');
    if (reste > 0) html += `<div class="detail-empty">+ ${reste} autre${reste>1?'s':''} ligne${reste>1?'s':''}</div>`;
    return html;
  }

  function fmtPct(v) { return v.toFixed(1).replace('.', ',') + ' %'; }
  function fmtDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit', year:'numeric' });
  }

  const RANK_CLASS = ['rank-1','rank-2','rank-3','rank-4','rank-5'];

  function renderTop5(items, cle) {
    return items.map((c,i) => `
      <div class="decision-item">
        <div class="decision-rank ${RANK_CLASS[i]}">${i+1}</div>
        <div class="decision-body">
          <div class="decision-title">${c.categorie}</div>
          <div class="decision-meta">${cle === 'ca'
            ? `marge ${fmtPct(c.ca>0 ? c.marge/c.ca*100 : 0)}`
            : `${fmtPct(c.ca>0 ? c.marge/c.ca*100 : 0)} de marge · CA ${fmtEur(c.ca)}`}</div>
        </div>
        <div class="decision-amount">${fmtEur(cle === 'ca' ? c.ca : c.marge)}</div>
      </div>`).join('');
  }

  function renderRoot(donnees) {
    const root = document.getElementById('root');
    if (!donnees || donnees.rows.length === 0) {
      root.innerHTML = `<div class="section"><div class="empty-panel"><div class="ei">📄</div><div class="et">Aucune donnée importée</div><div class="ed">Importez un export produits pour que le Scanner puisse analyser le magasin.</div><a class="btn-link" href="NEXUS-Import-v1.html">Aller à Import →</a></div></div>`;
      return;
    }

    const stats = construireStats(donnees.rows);
    const margePctGlobal = stats.caTotal > 0 ? (stats.margeTotal / stats.caTotal * 100) : 0;
    const circonference = 282.7;
    const dashoffset = circonference * (1 - Math.min(margePctGlobal,100) / 100);
    const pctExploitable = stats.nbRefs > 0 ? ((stats.nbRefs - stats.anomalies.length) / stats.nbRefs * 100) : 100;
    const pctA = stats.caTotal > 0 ? stats.classes.A.ca/stats.caTotal*100 : 0;
    const pctB = stats.caTotal > 0 ? stats.classes.B.ca/stats.caTotal*100 : 0;
    const pctC = stats.caTotal > 0 ? stats.classes.C.ca/stats.caTotal*100 : 0;

    document.getElementById('scanSubtitle').textContent = `Scan du magasin — au ${fmtDate(donnees.periodeFin)}`;

    root.innerHTML = `
      <div class="capital-panel">
        <div class="capital-row-top">
          <div class="capital-eyebrow">● Chiffre d'affaires analysé</div>
          <div class="capital-info">i</div>
        </div>
        <div class="capital-amount">${fmtEur(stats.caTotal)}</div>
        <div class="capital-sub">Sur ${stats.nbRefs.toLocaleString('fr-FR')} références, ${stats.nbCategories} catégories</div>
        <div class="capital-desc">Calculé à partir de l'export produits (quantité × prix de vente HT). Ne mesure pas encore la valeur créée par vos décisions — voir note en bas de page.</div>
        <div class="capital-badge">Marge totale : ${fmtEur(stats.margeTotal)} (${fmtPct(margePctGlobal)})</div>
        <div class="data-tag">📄 Période : ${fmtDate(donnees.periodeDebut)} → ${fmtDate(donnees.periodeFin)}</div>
      </div>

      <div class="section">
        <div class="section-label">Répartition ABC (par catégorie)</div>
      </div>
      <div class="section">
        <div class="levers-grid">
          <div class="lever-card" onclick="toggleCard(this)">
            <div class="lever-icon" style="background:var(--green-dim); color:var(--green);">A</div>
            <div class="lever-title">Catégories qui font l'essentiel du chiffre d'affaires</div>
            <div class="lever-amount" style="color:var(--green);">${stats.classes.A.n} catégorie${stats.classes.A.n>1?'s':''}</div>
            <div class="lever-meta">${fmtPct(pctA)} du CA</div>
            <div class="lever-toggle"><span class="chev">›</span> Voir le détail</div>
            <div class="lever-detail">${renderDetailListe(stats.catArr.filter(c => c.classe==='A'), 'ca')}</div>
          </div>
          <div class="lever-card" onclick="toggleCard(this)">
            <div class="lever-icon" style="background:var(--amber-dim); color:var(--amber);">B</div>
            <div class="lever-title">Catégories à poids intermédiaire</div>
            <div class="lever-amount" style="color:var(--amber);">${stats.classes.B.n} catégorie${stats.classes.B.n>1?'s':''}</div>
            <div class="lever-meta">${fmtPct(pctB)} du CA</div>
            <div class="lever-toggle"><span class="chev">›</span> Voir le détail</div>
            <div class="lever-detail">${renderDetailListe(stats.catArr.filter(c => c.classe==='B'), 'ca')}</div>
          </div>
          <div class="lever-card" onclick="toggleCard(this)">
            <div class="lever-icon" style="background:var(--cyan-dim); color:var(--cyan);">C</div>
            <div class="lever-title">Longue traîne — nombreuses réf., faible CA unitaire</div>
            <div class="lever-amount" style="color:var(--cyan);">${stats.classes.C.n} catégorie${stats.classes.C.n>1?'s':''}</div>
            <div class="lever-meta">${fmtPct(pctC)} du CA</div>
            <div class="lever-toggle"><span class="chev">›</span> Voir le détail</div>
            <div class="lever-detail">${renderDetailListe(stats.catArr.filter(c => c.classe==='C'), 'ca')}</div>
          </div>
          <div class="lever-card" onclick="toggleCard(this)">
            <div class="lever-icon" style="background:var(--violet-dim); color:var(--violet);">%</div>
            <div class="lever-title">Marge moyenne pondérée du magasin</div>
            <div class="lever-amount" style="color:var(--violet);">${fmtPct(margePctGlobal)}</div>
            <div class="lever-meta">${fmtEur(stats.margeTotal)} de marge totale</div>
            <div class="lever-toggle"><span class="chev">›</span> Voir le détail</div>
            <div class="lever-detail">${renderDetailListe(stats.catArr, 'margePct')}</div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-label">Vue financière</div>
        <div class="roi-panel">
          <div class="roi-col">
            <div class="roi-label">Chiffre d'affaires</div>
            <div class="roi-value">${fmtEur(stats.caTotal)}</div>
            <div class="roi-meta">${stats.nbRefs.toLocaleString('fr-FR')} réf.</div>
          </div>
          <div class="roi-donut">
            <svg viewBox="0 0 104 104" width="104" height="104">
              <circle cx="52" cy="52" r="45" fill="none" stroke="#242E38" stroke-width="9"/>
              <circle cx="52" cy="52" r="45" fill="none" stroke="#34D399" stroke-width="9"
                stroke-linecap="round" stroke-dasharray="${circonference}" stroke-dashoffset="${dashoffset.toFixed(1)}"
                transform="rotate(-90 52 52)"/>
            </svg>
            <div class="center">
              <div class="roi-tag">Marge</div>
              <div class="roi-pct">${fmtPct(margePctGlobal)}</div>
            </div>
          </div>
          <div class="roi-col">
            <div class="roi-label">Marge totale</div>
            <div class="roi-value green">${fmtEur(stats.margeTotal)}</div>
            <div class="roi-meta">Toutes catégories</div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-label">🏆 Top 5 catégories par chiffre d'affaires</div>
        ${renderTop5(stats.top5CA, 'ca')}
      </div>

      <div class="section">
        <div class="section-label">💰 Top 5 catégories par marge</div>
        ${renderTop5(stats.top5Marge, 'marge')}
      </div>

      <div class="section">
        <div class="two-col">
          <div class="mini-panel">
            <div class="mini-label">Poids du CA par classe</div>
            <div class="bar-row">
              <span class="bar-label">A</span>
              <div class="bar-track"><div class="bar-fill" style="width:${pctA.toFixed(0)}%; background:var(--green);"></div></div>
              <span class="bar-val">${pctA.toFixed(0)}%</span>
            </div>
            <div class="bar-row">
              <span class="bar-label">B</span>
              <div class="bar-track"><div class="bar-fill" style="width:${pctB.toFixed(0)}%; background:var(--amber);"></div></div>
              <span class="bar-val">${pctB.toFixed(0)}%</span>
            </div>
            <div class="bar-row">
              <span class="bar-label">C</span>
              <div class="bar-track"><div class="bar-fill" style="width:${pctC.toFixed(0)}%; background:var(--cyan);"></div></div>
              <span class="bar-val">${pctC.toFixed(0)}%</span>
            </div>
          </div>
          <div class="mini-panel${stats.anomalies.length>0?' clickable':''}" ${stats.anomalies.length>0?'onclick="toggleCard(this)"':''}>
            <div class="mini-label amber">Anomalies détectées</div>
            <div class="opp-number">${stats.anomalies.length}</div>
            <div class="opp-desc">ligne${stats.anomalies.length>1?'s':''} sur ${stats.nbRefs.toLocaleString('fr-FR')} à corriger (CA ou marge invalides)</div>
            <div class="opp-potential">${fmtPct(pctExploitable)} des lignes exploitables</div>
            ${stats.anomalies.length>0 ? `<div class="lever-toggle"><span class="chev">›</span> Voir le détail</div><div class="lever-detail">${renderDetailAnomalies(stats.anomalies)}</div>` : ''}
          </div>
        </div>
      </div>

      <div class="section">
        <div class="advisor-panel">
          <div class="advisor-avatar">N</div>
          <div class="advisor-body">
            <div class="advisor-title">Lecture des données</div>
            <p>${texteLecture(stats)}</p>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-label">Voir plus loin</div>
        <div class="empty-panel">
          <div class="ei"><img src="assets/icons/icon-centre-intelligence.png" alt="Centre d'Intelligence NEXUS"></div>
          <div class="et">Comprendre le pourquoi et suivre les décisions</div>
          <div class="ed">Cette page décrit l'état du magasin à un instant T. Pour l'analyse des causes et l'historique réel des décisions prises, direction le Centre d'Intelligence NEXUS et le Journal NEXUS.</div>
          <a class="btn-link" href="NEXUS-Centre-Intelligence-v1.html">Voir le Centre d'Intelligence NEXUS →</a>
        </div>
      </div>

      <div class="disclaimer">Cette page décrit l'état du magasin à un instant T (chiffre d'affaires, marge, catégories) — ce n'est pas encore la mesure de l'impact des décisions NEXUS. Cette mesure viendra avec le suivi des actions dans le temps.</div>
    `;
  }

  nexusRequireAuth().then(async employee => {
    if (!employee) return; // nexus-auth.js gère déjà la redirection vers NEXUS-Login-v1.html
    if (employee.role !== 'manager' && employee.role !== 'gerant') {
      document.body.innerHTML = '<div style="padding:60px 20px; text-align:center; color:#8A96A5; font-family:sans-serif; background:#0B0F14; min-height:100vh;">Cet écran est réservé aux managers.</div>';
      return;
    }
    const donnees = await chargerDonneesScanner();
    renderRoot(donnees);
  });
</script>
</body>
</html>

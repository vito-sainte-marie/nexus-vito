<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — Missions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0F14; --panel:#141B22; --panel-raised:#1A222C; --hairline:#242E38;
    --text:#EDF1F5; --text-mid:#8A96A5; --text-dim:#57626F;
    --green:#34D399; --green-dim:#153629;
    --amber:#F5A623; --amber-dim:#3A2E14;
    --red:#F0575A; --red-dim:#3A1D1F;
    --cyan:#4FC3D9;
    --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:var(--bg); font-family:var(--sans); color:var(--text);}
  body{display:flex; justify-content:center; min-height:100vh;}
  .phone{width:100%; max-width:460px; min-height:100vh; display:flex; flex-direction:column; border-left:1px solid var(--hairline); border-right:1px solid var(--hairline);}

  .header{padding:20px 20px 14px;}
  .eyebrow{font-family:var(--mono); font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--cyan);}
  .title{font-size:20px; font-weight:600; margin-top:4px;}
  .divider{height:1px; background:var(--hairline); margin:0 20px;}

  .search-wrap{padding:14px 20px 8px;}
  .search-box{display:flex; align-items:center; gap:10px; background:var(--panel); border:1px solid var(--hairline); border-radius:10px; padding:11px 14px;}
  .search-box input{flex:1; background:none; border:none; outline:none; color:var(--text); font-family:var(--sans); font-size:13.5px;}
  .search-box input::placeholder{color:var(--text-dim);}

  .tabs{display:flex; gap:6px; padding:10px 20px; overflow-x:auto;}
  .tab{
    flex-shrink:0; padding:7px 13px; border-radius:20px; font-size:11.5px; font-weight:600;
    background:var(--panel); border:1px solid var(--hairline); cursor:pointer; color:var(--text-mid); white-space:nowrap;
  }
  .tab.active{background:rgba(79,195,217,0.12); border-color:var(--cyan); color:var(--cyan);}

  .section{padding:6px 20px 20px;}
  .section-label{font-family:var(--mono); font-size:10.5px; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-dim); margin:14px 0 10px; display:flex; align-items:center; gap:8px;}
  .section-label::after{content:''; flex:1; height:1px; background:var(--hairline);}

  .mission-card{background:var(--panel); border:1px solid var(--hairline); border-radius:12px; margin-bottom:10px; overflow:hidden;}
  .mission-head{padding:14px 16px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; gap:10px;}
  .mission-titre{font-size:13.5px; font-weight:600; flex:1;}
  .mission-meta{font-family:var(--mono); font-size:10px; color:var(--text-dim); margin-top:3px;}
  .badge{font-family:var(--mono); font-size:9.5px; padding:3px 8px; border-radius:20px; font-weight:600; white-space:nowrap;}
  .badge-critique{background:var(--red-dim); color:var(--red);}
  .badge-haute{background:var(--amber-dim); color:var(--amber);}
  .badge-normale{background:rgba(79,195,217,0.12); color:var(--cyan);}
  .badge-basse{background:var(--panel-raised); color:var(--text-dim);}
  .badge-auto{background:var(--green-dim); color:var(--green);}

  .mission-body{display:none; padding:0 16px 16px; border-top:1px solid var(--hairline);}
  .mission-body.open{display:block;}
  .mission-pourquoi{font-size:12px; color:var(--text-mid); line-height:1.5; margin:12px 0;}
  .check-item{display:flex; align-items:flex-start; gap:10px; padding:8px 0; font-size:12.5px; cursor:pointer;}
  .check-box{width:18px; height:18px; border:1.5px solid var(--text-dim); border-radius:5px; flex-shrink:0; margin-top:1px; display:flex; align-items:center; justify-content:center; font-size:12px;}
  .check-box.checked{background:var(--green); border-color:var(--green); color:#04141a;}
  .check-text.checked{color:var(--text-dim); text-decoration:line-through;}
  .mission-photo{font-family:var(--mono); font-size:10px; color:var(--amber); margin-top:10px;}
  .btn-valider{
    width:100%; margin-top:12px; padding:12px; border:none; border-radius:8px; font-size:13px; font-weight:600;
    background:var(--cyan); color:#04141a; cursor:pointer;
  }
  .btn-valider:disabled{opacity:0.3; cursor:not-allowed;}
  .validation-ok{margin-top:12px; padding:10px; text-align:center; background:var(--green-dim); color:var(--green); border-radius:8px; font-size:12.5px; font-weight:600;}

  .empty-note{padding:30px 20px; text-align:center; color:var(--text-dim); font-size:12.5px;}

  footer{margin-top:auto; padding:16px 20px 24px; font-family:var(--mono); font-size:10px; color:var(--text-dim); text-align:center; border-top:1px solid var(--hairline);}
  .plan-card{background:var(--panel); border:1px solid var(--hairline); border-radius:12px; margin-bottom:10px; overflow:hidden; border-left:3px solid var(--hairline);}
  .plan-card.etat-agir{border-left-color:#F0575A;}
  .plan-card.etat-opportunite{border-left-color:#34D399;}
  .plan-card.etat-surveiller{border-left-color:#F5A623;}
  .plan-card.etat-decider{border-left-color:#F0575A;}
  .plan-card.etat-recommandation{border-left-color:#4FC3D9;}
  .plan-head{padding:14px 16px; cursor:pointer; display:flex; align-items:center; gap:12px;}
  .plan-etat{font-family:var(--mono); font-size:9.5px; letter-spacing:0.05em; padding:3px 9px; border-radius:20px; font-weight:700; white-space:nowrap;}
  .etat-agir .plan-etat{background:#3A1D1F; color:#F0575A;}
  .etat-opportunite .plan-etat{background:#153629; color:#34D399;}
  .etat-surveiller .plan-etat{background:#3A2E14; color:#F5A623;}
  .etat-decider .plan-etat{background:#3A1D1F; color:#F0575A;}
  .etat-recommandation .plan-etat{background:rgba(79,195,217,0.12); color:#4FC3D9;}
  .plan-action-teaser{flex:1; font-size:13.5px; font-weight:600; line-height:1.4;}
  .plan-chevron{color:var(--text-dim); font-size:14px; transition:0.15s;}
  .plan-card.open .plan-chevron{transform:rotate(90deg);}
  .plan-body{display:none; padding:0 16px 16px;}
  .plan-card.open .plan-body{display:block;}
  .plan-story{font-size:12.5px; line-height:1.75; color:var(--text-mid);}
  .plan-story .story-label{font-family:var(--mono); font-size:9.5px; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-dim); display:block; margin-top:10px; margin-bottom:2px;}
  .plan-impact{margin-top:12px; padding:10px 12px; background:var(--panel-raised); border-radius:8px; font-size:12px;}
  .plan-impact b{color:#34D399;}
</style>
</head>

  };
  function renderPlansActionMissions() {
    const el = document.getElementById('plansActionMissions');
    if (!el) return;

      <div class="plan-card ${ETAT_CLASS[p.etat]||''}" id="planm-${i}">

  const session = JSON.parse(localStorage.getItem('nexus_session') || 'null');

  if (!progression[employeActuel]) progression[employeActuel] = {};

  const tabsEl = document.getElementById('tabs');
  FAMILLES.forEach(f => {
    const t = document.createElement('div');
    t.className = 'tab' + (f===familleActive ? ' active' : '');

    t.onclick = () => { familleActive = f; render(); };
    tabsEl.appendChild(t);
  });

  document.getElementById('search').addEventListener('input', render);

  function priorityBadge(p) {
    return `<span class="badge badge-${p}">${p}</span>`;
  }

  function renderChecklist(missionId, checklist) {
    return checklist.map((item, i) => {
      const key = `${missionId}_${i}`;
      const checked = checkState[key];
      return `<div class="check-item" data-key="${key}">
        <div class="check-box ${checked?'checked':''}">${checked?'✓':''}</div>
        <div class="check-text ${checked?'checked':''}">${item}</div>
      </div>`;
    }).join('');
  }

  function chargerCompletions() { return JSON.parse(localStorage.getItem('nexus_missions_completees') || '[]'); }

  const POINTS_PAR_PRIORITE = {critique:10, haute:7, normale:5, basse:3};

  function toutCoche(mission) {
    return mission.checklist.every((_, i) => checkState[`${mission.mission_id}_${i}`]);
  }

  function renderMissionCard(m, isAuto) {
    const priorite = m.priorite || 'normale';
    const complet = toutCoche(m);
    const dejaValidee = chargerCompletions().some(c => c.employe === employeActuel && c.mission_id === m.mission_id && c.date === new Date().toISOString().slice(0,10));
    return `

        <div class="mission-head" data-id="${m.mission_id}">

        </div>
      </div>`;
  }

  function render() {
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent === familleActive));
    const q = document.getElementById('search').value.trim().toLowerCase();
    const content = document.getElementById('content');

    let html = '';

    if (!q) {
      html += `<div class="section-label">Aujourd'hui — recommandé par le Conseiller NEXUS</div>`;

    let lib = DATA.library.filter(m => familleActive==='Toutes' || m.famille===familleActive);
    if (q) lib = lib.filter(m => m.titre.toLowerCase().includes(q) || m.pourquoi.toLowerCase().includes(q));

    html += `<div class="section-label">${q ? 'Résultats' : 'Bibliothèque de procédures'} (${lib.length})</div>`;
    if (lib.length === 0) {
      html += `<div class="empty-note">Aucune mission ne correspond.</div>`;
    } else {
      lib.forEach(m => html += renderMissionCard(m, false));
    }

    content.innerHTML = html;
    renderPlansActionMissions();

    content.querySelectorAll('.mission-head').forEach(el => {
      el.addEventListener('click', () => {
        const id = el.dataset.id;
        if (missionsOuvertes.has(id)) missionsOuvertes.delete(id); else missionsOuvertes.add(id);
        document.getElementById(`body-${id}`).classList.toggle('open');
      });
    });
    content.querySelectorAll('.check-item').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        const key = el.dataset.key;
        checkState[key] = !checkState[key];
        progression[employeActuel] = checkState;
        sauvegarderProgression(progression);
        render(); // re-rendu pour activer/desactiver le bouton Valider
      });
    });

    content.querySelectorAll('.btn-valider').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const missionId = btn.dataset.mission;
        const mission = [...DATA.library, ...DATA.missions_auto].find(m => m.mission_id === missionId);
        if (!mission) return;

        const finaliser = (photoFournie) => {
          if (mission.photo_requise && !photoFournie) {
            alert('Photo requise — la mission ne peut pas être validée sans preuve.');
            return;
          }
          const points = mission.photo_requise
            ? (POINTS_PAR_PRIORITE[mission.priorite] || 5) + 2
            : (POINTS_PAR_PRIORITE[mission.priorite] || 5);
          const completions = chargerCompletions();
          completions.push({
            employe: employeActuel, mission_id: missionId, titre: mission.titre,
            date: new Date().toISOString().slice(0,10), heure: new Date().toTimeString().slice(0,5),
            photo_fournie: !!photoFournie, points,
          });
          sauvegarderCompletions(completions);
          render();
        };

        if (mission.photo_requise) {
          const input = document.getElementById(`photo-${missionId}`);
          input.onchange = () => finaliser(input.files && input.files.length > 0);
          input.click();
        } else {
          finaliser(false);
        }
      });
    });
  }

  render();
</script>

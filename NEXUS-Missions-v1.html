<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — Missions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="nexus-auth.js"></script>
<style>
  :root{
    --bg:#0B0F14; --panel:#141B22; --panel-raised:#1A222C; --hairline:#242E38;
    --text:#EDF1F5; --text-mid:#8A96A5; --text-dim:#57626F;
    --green:#34D399; --green-dim:#153629;
    --amber:#F5A623; --amber-dim:#3A2E14;
    --red:#F0575A; --red-dim:#3A1D1F;
    --cyan:#4FC3D9;
    --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:var(--bg); font-family:var(--sans); color:var(--text);}
  body{display:flex; justify-content:center; min-height:100vh;}
  .phone{width:100%; max-width:460px; min-height:100vh; display:flex; flex-direction:column; border-left:1px solid var(--hairline); border-right:1px solid var(--hairline);}

  .header{padding:20px 20px 14px; position:relative;}
  .menu-btn{
    position:absolute; top:18px; right:18px; display:flex; align-items:center; gap:6px;
    font-family:var(--mono); font-size:10.5px; font-weight:600; letter-spacing:0.03em; text-transform:uppercase;
    color:var(--cyan); background:rgba(79,195,217,0.1); border:1px solid rgba(79,195,217,0.3);
    border-radius:20px; padding:7px 12px; text-decoration:none; white-space:nowrap; z-index:5;
  }
  .menu-btn:active{background:rgba(79,195,217,0.2);}
  .eyebrow{font-family:var(--mono); font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--cyan);}
  .title{font-size:20px; font-weight:600; margin-top:4px;}
  .role-jour{font-family:var(--mono); font-size:11px; color:var(--text-dim); margin-top:4px; display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
  .role-jour a{color:var(--cyan); text-decoration:none;}
  .divider{height:1px; background:var(--hairline); margin:0 20px;}

  .search-wrap{padding:14px 20px 8px;}
  .search-box{display:flex; align-items:center; gap:10px; background:var(--panel); border:1px solid var(--hairline); border-radius:10px; padding:11px 14px;}
  .search-box input{flex:1; background:none; border:none; outline:none; color:var(--text); font-family:var(--sans); font-size:13.5px;}
  .search-box input::placeholder{color:var(--text-dim);}

  .tabs{display:flex; gap:6px; padding:10px 20px; overflow-x:auto;}
  .tab{
    flex-shrink:0; padding:7px 13px; border-radius:20px; font-size:11.5px; font-weight:600;
    background:var(--panel); border:1px solid var(--hairline); cursor:pointer; color:var(--text-mid); white-space:nowrap;
  }
  .tab.active{background:rgba(79,195,217,0.12); border-color:var(--cyan); color:var(--cyan);}

  .section{padding:6px 20px 20px;}
  .section-label{font-family:var(--mono); font-size:10.5px; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-dim); margin:14px 0 10px; display:flex; align-items:center; gap:8px;}
  .section-label::after{content:''; flex:1; height:1px; background:var(--hairline);}

  .mission-card{background:var(--panel); border:1px solid var(--hairline); border-radius:12px; margin-bottom:10px; overflow:hidden;}
  .mission-head{padding:14px 16px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; gap:10px;}
  .mission-titre{font-size:13.5px; font-weight:600; flex:1;}
  .mission-meta{font-family:var(--mono); font-size:10px; color:var(--text-dim); margin-top:3px;}
  .badge{font-family:var(--mono); font-size:9.5px; padding:3px 8px; border-radius:20px; font-weight:600; white-space:nowrap;}
  .badge-critique{background:var(--red-dim); color:var(--red);}
  .badge-haute{background:var(--amber-dim); color:var(--amber);}
  .badge-normale{background:rgba(79,195,217,0.12); color:var(--cyan);}
  .badge-basse{background:var(--panel-raised); color:var(--text-dim);}
  .badge-auto{background:var(--green-dim); color:var(--green);}
  .badge-controle{background:rgba(79,195,217,0.12); color:var(--cyan);}

  .mission-body{display:none; padding:0 16px 16px; border-top:1px solid var(--hairline);}
  .mission-body.open{display:block;}
  .mission-pourquoi{font-size:12px; color:var(--text-mid); line-height:1.5; margin:12px 0;}
  .check-item{display:flex; align-items:flex-start; gap:10px; padding:8px 0; font-size:12.5px; cursor:pointer;}
  .check-box{width:18px; height:18px; border:1.5px solid var(--text-dim); border-radius:5px; flex-shrink:0; margin-top:1px; display:flex; align-items:center; justify-content:center; font-size:12px;}
  .check-box.checked{background:var(--green); border-color:var(--green); color:#04141a;}
  .check-text.checked{color:var(--text-dim); text-decoration:line-through;}
  .mission-photo{font-family:var(--mono); font-size:10px; color:var(--amber); margin-top:10px;}
  .btn-valider{
    width:100%; margin-top:12px; padding:12px; border:none; border-radius:8px; font-size:13px; font-weight:600;
    background:var(--cyan); color:#04141a; cursor:pointer;
  }
  .btn-valider:disabled{opacity:0.3; cursor:not-allowed;}
  .validation-ok{margin-top:12px; padding:10px; text-align:center; background:var(--green-dim); color:var(--green); border-radius:8px; font-size:12.5px; font-weight:600;}

  .controle-banner{background:rgba(79,195,217,0.08); border:1px solid rgba(79,195,217,0.3); border-radius:8px; padding:10px 12px; font-size:11.5px; color:var(--cyan); line-height:1.5; margin:12px 0;}
  .presence-label{font-family:var(--mono); font-size:10.5px; letter-spacing:0.05em; text-transform:uppercase; color:var(--text-dim); margin:16px 0 6px;}
  .presence-item{display:flex; align-items:center; gap:10px; padding:6px 0; font-size:12.5px; cursor:pointer;}
  .presence-box{width:16px; height:16px; border:1.5px solid var(--text-dim); border-radius:4px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:11px;}
  .presence-box.checked{background:var(--cyan); border-color:var(--cyan); color:#04141a;}
  .evaluer-liens{margin-top:10px; display:flex; flex-direction:column; gap:6px;}
  .evaluer-lien{font-family:var(--mono); font-size:11.5px; color:var(--cyan); text-decoration:none;}

  .empty-note{padding:30px 20px; text-align:center; color:var(--text-dim); font-size:12.5px;}

  footer{margin-top:auto; padding:16px 20px 24px; font-family:var(--mono); font-size:10px; color:var(--text-dim); text-align:center; border-top:1px solid var(--hairline);}
  .plan-card{background:var(--panel); border:1px solid var(--hairline); border-radius:12px; margin-bottom:10px; overflow:hidden; border-left:3px solid var(--hairline);}
  .plan-card.etat-agir{border-left-color:#F0575A;}
  .plan-card.etat-opportunite{border-left-color:#34D399;}
  .plan-card.etat-surveiller{border-left-color:#F5A623;}
  .plan-card.etat-decider{border-left-color:#F0575A;}
  .plan-card.etat-recommandation{border-left-color:#4FC3D9;}
  .plan-head{padding:14px 16px; cursor:pointer; display:flex; align-items:center; gap:12px;}
  .plan-etat{font-family:var(--mono); font-size:9.5px; letter-spacing:0.05em; padding:3px 9px; border-radius:20px; font-weight:700; white-space:nowrap;}
  .etat-agir .plan-etat{background:#3A1D1F; color:#F0575A;}
  .etat-opportunite .plan-etat{background:#153629; color:#34D399;}
  .etat-surveiller .plan-etat{background:#3A2E14; color:#F5A623;}
  .etat-decider .plan-etat{background:#3A1D1F; color:#F0575A;}
  .etat-recommandation .plan-etat{background:rgba(79,195,217,0.12); color:#4FC3D9;}
  .plan-action-teaser{flex:1; font-size:13.5px; font-weight:600; line-height:1.4;}
  .plan-chevron{color:var(--text-dim); font-size:14px; transition:0.15s;}
  .plan-card.open .plan-chevron{transform:rotate(90deg);}
  .plan-body{display:none; padding:0 16px 16px;}
  .plan-card.open .plan-body{display:block;}
  .plan-story{font-size:12.5px; line-height:1.75; color:var(--text-mid);}
  .plan-story .story-label{font-family:var(--mono); font-size:9.5px; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-dim); display:block; margin-top:10px; margin-bottom:2px;}
  .plan-impact{margin-top:12px; padding:10px 12px; background:var(--panel-raised); border-radius:8px; font-size:12px;}
  .plan-impact b{color:#34D399;}
  .plan-valider{width:100%; margin-top:12px; padding:11px; border:none; border-radius:8px; font-size:12.5px; font-weight:600; background:var(--green); color:#04141a; cursor:pointer;}

  .conseiller-perso{background:linear-gradient(135deg, rgba(79,195,217,0.08), rgba(79,195,217,0.02)); border:1px solid rgba(79,195,217,0.25); border-radius:14px; padding:16px 18px; margin:0 20px 14px;}
  .conseiller-perso-head{display:flex; align-items:center; gap:11px; margin-bottom:10px;}
  .conseiller-perso-avatar{width:42px; height:42px; border-radius:50%; object-fit:cover; flex-shrink:0; filter:drop-shadow(0 0 9px rgba(79,195,217,0.5));}
  .conseiller-perso-nom{font-family:var(--mono); font-size:11px; font-weight:700; color:var(--cyan); letter-spacing:0.03em;}
  .conseiller-perso-sous{font-family:var(--mono); font-size:9px; color:var(--text-dim);}
  .conseiller-perso-texte{font-size:12.5px; line-height:1.6; color:var(--text);}
  .conseiller-perso-palier{margin-top:12px;}
  .conseiller-perso-palier-ligne{font-family:var(--mono); font-size:10px; color:var(--text-mid); display:flex; justify-content:space-between; margin-bottom:5px;}
  .conseiller-perso-bar-track{height:6px; background:var(--panel-raised); border-radius:3px; overflow:hidden;}
  .conseiller-perso-bar{height:100%; background:var(--cyan); border-radius:3px;}
</style>
</head>
<body>
<div class="phone">
  <div class="header">
    <a href="NEXUS-App-v1.html" class="menu-btn">☰ Menu</a>
    <div class="eyebrow">NEXUS · Plans d'action</div>
    <div class="title">Vos plans d'action</div>
    <div class="role-jour" id="roleJourLigne"></div>
  </div>
  <div class="divider"></div>

  <div id="conseillerPersoSection"></div>

  <div class="search-wrap">
    <div class="search-box"><span>🔍</span><input type="text" id="search" placeholder="Rechercher un plan d'action..."></div>
  </div>
  <div class="tabs" id="tabs"></div>

  <div class="section" id="content"></div>
  <footer>NEXUS Plans d'action v1 · 55 procédures · Cahier de Notes de Services intégré</footer>
</div>

<script>
  let catalogue = [];
  let roleDuJour = null;

  async function chargerCatalogue() {
    const { data, error } = await nexusClient
      .from('mission_catalog')
      .select('*')
      .eq('actif', true);
    if (error) { console.error('Chargement catalogue:', error); return []; }
    return data || [];
  }

  // Corrige le 21/07/2026 (Frederic a signale devoir reconfirmer sa
  // prise de poste a chaque retour sur cet ecran) : l'ancienne version
  // comparait heure_debut a des chaines "AAAA-MM-JJT00:00:00" / "T23:59:59"
  // SANS fuseau horaire explicite — une comparaison ambigue contre une
  // colonne timestamptz, potentiellement mal interpretee selon le fuseau
  // de session Postgres. Remplace par une vraie fenetre glissante de 24h,
  // avec des bornes ISO completes (avec "Z", donc UTC sans ambiguite) —
  // en plus de corriger ce risque, ca correspond exactement a la demande
  // de Frederic : la prise de poste reste valable 24h, pas jusqu'a minuit.
  async function chargerShiftAujourdhui(employeeId) {
    const il24h = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
    const { data, error } = await nexusClient
      .from('shifts')
      .select('role')
      .eq('employee_id', employeeId)
      .gte('heure_debut', il24h)
      .order('heure_debut', { ascending: false })
      .limit(1);
    if (error) { console.error('Chargement shift du jour:', error); return null; }
    return (data && data[0]) ? data[0].role : null;
  }

  // Employes actifs du site — utilise pour le "controle manager" (cf.
  // estMissionControleManager) : le manager coche qui etait present sur
  // site au moment du controle, puis peut les evaluer directement.
  async function chargerEmployesSite() {
    const { data, error } = await nexusClient.from('employees').select('id, nom').eq('site_id', SITE_ACTUEL).eq('actif', true).order('nom');
    if (error) { console.error('Chargement employés (contrôle mission):', error); return []; }
    return data || [];
  }
  let EMPLOYES_SITE = [];
  let presentsState = {};

  // Nuance demandee par Frederic (20/07/2026, precisee le 20/07/2026) : pour
  // le manager, le nettoyage et la gestion des dechets sont des CONTROLES —
  // il verifie que l'equipe l'a fait, il ne le fait pas lui-meme. Cible sur
  // le titre de la mission (pas sur toute la famille Qualite/Securite, qui
  // peut contenir d'autres missions que le manager execute lui-meme).
  // Applique uniquement quand l'ecran est vu par un manager (les employes
  // gardent leurs missions "a faire" normales).
  function estMissionControleManager(m) {
    if (roleDuJour !== 'manager') return false;
    const titre = (m.titre || '').toLowerCase();
    return titre.includes('nettoyage') || titre.includes('déchet') || titre.includes('dechet');
  }

  const FAMILLES = ["Toutes","Commerce","Qualité","Sécurité","Exploitation","Management"];
  let familleActive = "Toutes";
  const missionsOuvertes = new Set();

  // ------------------------------------------------------------
  // Recommandations du Conseiller NEXUS — CORRIGE le 20/07/2026 (Frederic a
  // signale qu'un facing Heineken valide restait visible ici ET dans
  // Cockpit). Cause : cette carte utilisait un jeu de donnees fige/de demo
  // (candidate_id type "RET-R4-..."), totalement decorrele des vraies ventes
  // et du moteur de detection live utilise par Cockpit et Centre
  // d'Intelligence (candidate_id type "LIVE-R4-<rayon>|<article>") — valider
  // une recommandation ailleurs ne pouvait donc jamais faire disparaitre
  // celle-ci. Missions utilise maintenant le MEME moteur live (memes regles,
  // memes candidate_id) que Cockpit/CIN, sur les memes donnees "products",
  // pour que valider une recommandation depuis n'importe quel ecran la fasse
  // disparaitre partout.
  // ------------------------------------------------------------
  function typeActionPourCategorie(categorie) {
    const c = (categorie || '').toLowerCase();
    if (c.includes('gaz')) return 'stock';
    if (c.includes('carte') || c.includes('prépayé') || c.includes('prepaye') || c.includes('transcash') || c.includes('pcs')) return 'support';
    if (c.includes('pain') || c.includes('patisserie') || c.includes('pâtisserie') || c.includes('viennoiserie') || c.includes('sandwich') || c.includes('snack')) return 'production';
    if (c.includes('tabac') || c.includes('cigarette') || c.includes('paquet de')) return 'comptoir';
    if (c.includes('presse')) return 'presentoir';
    return 'facing';
  }

  const LANGAGE_ACTION = {
    facing: {
      analyseAgir: "Une référence à ce niveau de contribution mérite un facing à la hauteur de son poids réel.",
      recoAgir: a => `Je recommande de vérifier et renforcer le facing de ${a}.`,
      consAgir: m => `Un sous-dimensionnement de facing sur cette référence représente un risque estimé à ${m} €.`,
      recoHausse: a => `Il serait utile de renforcer le facing de ${a} avant la période suivante.`,
      recoBaisse: a => `Vérifiez la présence en rayon de ${a} avant toute décision.`,
    },
    stock: {
      analyseAgir: "Une référence à ce niveau de contribution ne doit jamais être en rupture en dépôt — elle n'est pas exposée en rayon comme les autres.",
      recoAgir: a => `Je recommande de vérifier le stock disponible en dépôt/cage pour ${a}.`,
      consAgir: m => `Une rupture de stock sur cette référence représente un risque estimé à ${m} €.`,
      recoHausse: a => `Sécurisez davantage de stock de ${a} avant la période suivante.`,
      recoBaisse: a => `Vérifiez le stock en dépôt/cage de ${a} avant toute décision.`,
    },
    support: {
      analyseAgir: "Une référence à ce niveau de contribution dépend surtout de la disponibilité du support et de son activation en caisse, pas d'un emplacement en rayon.",
      recoAgir: a => `Je recommande de vérifier le stock de cartes et la bonne activation en caisse pour ${a}.`,
      consAgir: m => `Une indisponibilité de ce support représente un risque estimé à ${m} €.`,
      recoHausse: a => `Prévoyez davantage de support et d'activation pour ${a} avant la période suivante.`,
      recoBaisse: a => `Vérifiez la disponibilité du support et son activation en caisse pour ${a} avant toute décision.`,
    },
    production: {
      analyseAgir: "Une référence à ce niveau de contribution dépend surtout de la quantité produite ou commandée chaque jour — c'est un produit frais, pas un facing.",
      recoAgir: a => `Je recommande d'ajuster la quantité commandée ou produite de ${a} au niveau réel de la demande.`,
      consAgir: m => `Une quantité insuffisante sur cette référence fraîche représente un risque estimé à ${m} €.`,
      recoHausse: a => `Augmentez la quantité commandée ou produite de ${a} avant la période suivante.`,
      recoBaisse: a => `Vérifiez si la quantité produite ou commandée de ${a} a été réduite avant toute décision.`,
    },
    comptoir: {
      analyseAgir: "Une référence à ce niveau de contribution doit rester visible et disponible au comptoir en priorité.",
      recoAgir: a => `Je recommande de vérifier la disponibilité au comptoir de ${a}.`,
      consAgir: m => `Une rupture au comptoir sur cette référence représente un risque estimé à ${m} €.`,
      recoHausse: a => `Garantissez la disponibilité au comptoir de ${a} avant la période suivante.`,
      recoBaisse: a => `Vérifiez la disponibilité au comptoir de ${a} avant toute décision.`,
    },
    presentoir: {
      analyseAgir: "Une référence à ce niveau de contribution mérite une bonne visibilité sur le présentoir.",
      recoAgir: a => `Je recommande de vérifier l'emplacement de ${a} sur le présentoir.`,
      consAgir: m => `Un mauvais emplacement sur cette référence représente un risque estimé à ${m} €.`,
      recoHausse: a => `Améliorez l'emplacement de ${a} sur le présentoir avant la période suivante.`,
      recoBaisse: a => `Vérifiez l'emplacement de ${a} sur le présentoir avant toute décision.`,
    },
  };

  async function chargerProduitsAppel() {
    const { data, error } = await nexusClient.from('produits_appel').select('article').eq('site', SITE_ACTUEL);
    if (error) { console.error('Chargement produits d’appel:', error); return new Set(); }
    return new Set((data || []).map(r => r.article));
  }

  // Supabase plafonne chaque requete a 1000 lignes par defaut, sans erreur —
  // ce helper boucle par pages de 1000 jusqu'a tout recuperer. Meme correctif
  // que Cockpit/CIN (trouve le 15/07/2026).
  async function fetchAllRows(builderFactory, pageSize = 1000) {
    let toutes = [];
    let from = 0;
    while (true) {
      const { data, error } = await builderFactory().range(from, from + pageSize - 1);
      if (error) return { data: null, error };
      toutes = toutes.concat(data || []);
      if (!data || data.length < pageSize) break;
      from += pageSize;
    }
    return { data: toutes, error: null };
  }

  async function construirePlansAction() {
    const [{ data, error }, produitsAppel] = await Promise.all([
      fetchAllRows(() => nexusClient
        .from('products')
        .select('categorie, article, ca, marge, periode_debut, periode_fin')
        .eq('site', SITE_ACTUEL)
        .order('periode_debut', { ascending: false })
        .order('article', { ascending: true })),
      chargerProduitsAppel(),
    ]);
    if (error || !data || !data.length) { if (error) console.error('Chargement products (plans action):', error); return []; }

    const rowsBrut = data.filter(r => !produitsAppel.has(r.article));
    const periodes = [...new Set(rowsBrut.map(r => r.periode_debut))].sort().reverse();
    const periodeActuelle = periodes[0];
    const periodePrecedente = periodes[1] || null;
    const rowsActuels = rowsBrut.filter(r => r.periode_debut === periodeActuelle);
    const rowsPrecedents = periodePrecedente ? rowsBrut.filter(r => r.periode_debut === periodePrecedente) : [];

    const caTotalParRayon = {};
    rowsActuels.forEach(r => { caTotalParRayon[r.categorie] = (caTotalParRayon[r.categorie] || 0) + (r.ca || 0); });

    const precedentParArticle = {};
    rowsPrecedents.forEach(r => {
      const cle = r.categorie + '|' + r.article;
      precedentParArticle[cle] = (precedentParArticle[cle] || 0) + (r.ca || 0);
    });

    const candidats = [];
    const fmt = v => Math.round(v).toLocaleString('fr-FR');

    rowsActuels.forEach(p => {
      const caRayon = caTotalParRayon[p.categorie] || 0;
      const contribution = caRayon > 0 ? p.ca / caRayon : 0;
      const cle = p.categorie + '|' + p.article;
      const caPrec = precedentParArticle[cle];
      const evolution = (caPrec && caPrec > 0) ? (p.ca - caPrec) / caPrec : null;

      if (contribution >= 0.15 && p.ca > 0) {
        const lang = LANGAGE_ACTION[typeActionPourCategorie(p.categorie)];
        candidats.push({
          etat: "🔥 À AGIR", rule_id: "R4-RENFORT-A", article: p.article, categorie: p.categorie,
          situation: `${p.article} représente ${(contribution*100).toFixed(1)} % du chiffre d'affaires du rayon ${p.categorie}.`,
          contexte: "Cette contribution est calculée sur l'ensemble des références du rayon.",
          analyse: lang.analyseAgir,
          consequence: lang.consAgir(fmt(p.ca)),
          recommandation: lang.recoAgir(p.article),
          impact: `Vous sécurisez environ ${fmt(p.ca)} € de chiffre d'affaires déjà généré par cette référence.`,
          candidate_id: `LIVE-R4-${cle}`, impact_eur: p.ca,
        });
      }
      if (evolution !== null && evolution >= 0.20) {
        const gain = Math.max(p.ca - caPrec, 0);
        const lang = LANGAGE_ACTION[typeActionPourCategorie(p.categorie)];
        candidats.push({
          etat: "📈 OPPORTUNITÉ", rule_id: "R3-HAUSSE", article: p.article, categorie: p.categorie,
          situation: `Les ventes de ${p.article} progressent de ${(evolution*100).toFixed(1)} % sur la période.`,
          contexte: "Cette progression est mesurée entre les deux périodes importées.",
          analyse: "Cette dynamique dépasse une croissance ordinaire.",
          consequence: "Cette croissance peut être amplifiée si l'offre suit la demande.",
          recommandation: lang.recoHausse(p.article),
          impact: `Vous avez gagné environ ${fmt(gain)} € sur cette référence depuis la période précédente.`,
          candidate_id: `LIVE-R3-${cle}`, impact_eur: gain,
        });
      }
      if (evolution !== null && evolution <= -0.30) {
        const perte = Math.max(caPrec - p.ca, 0);
        const lang = LANGAGE_ACTION[typeActionPourCategorie(p.categorie)];
        candidats.push({
          etat: "🟡 À SURVEILLER", rule_id: "R2-BAISSE", article: p.article, categorie: p.categorie,
          situation: `Les ventes de ${p.article} chutent de ${(evolution*100).toFixed(1)} % sur la période.`,
          contexte: "NEXUS ne dispose pas de la donnée de stock pour cette référence.",
          analyse: "Je ne peux pas encore conclure à une vraie tendance sans vérification terrain.",
          consequence: "Une rupture non détectée expliquerait aussi bien cette baisse qu'un désintérêt réel.",
          recommandation: lang.recoBaisse(p.article),
          impact: "Vérification demandée — aucune conclusion tant que le stock n'est pas confirmé.",
          candidate_id: `LIVE-R2-${cle}`, impact_eur: perte,
        });
      }
    });

    candidats.sort((a, b) => b.impact_eur - a.impact_eur);
    return candidats;
  }

  let PLANS_ACTION = [];
  const ETAT_CLASS = {

  async function chargerValidees() {
    // Fenetre de 30 jours — meme regle que Centre d'Intelligence : une
    // recommandation validee reste masquee 30 jours, puis peut resurgir si la
    // situation le justifie encore.
    const il30j = new Date(Date.now() - 30*24*60*60*1000).toISOString();
    const { data, error } = await nexusClient.from('recommandations_validees').select('candidate_id').eq('site', SITE_ACTUEL).gte('created_at', il30j);

  let employeActuel = null;
  let employeeId = null;

  async function chargerProgressionSupabase(empId) {

  // Upload reel du fichier vers Supabase Storage (bucket prive) + lien signe
  // longue duree, enregistre directement en base — remplace l'ancien
  // comportement qui ne verifiait qu'un booleen sans jamais conserver le
  // fichier (corrige le 15/07/2026, a la demande explicite de Frederic).
  async function uploaderPreuvePhoto(missionId, file) {
    const ext = (file.name && file.name.includes('.')) ? file.name.split('.').pop().toLowerCase() : 'jpg';
    const chemin = `${employeeId}/${missionId}-${Date.now()}.${ext}`;
    const { error: erreurUpload } = await nexusClient.storage
      .from('preuves-missions')
      .upload(chemin, file, { contentType: file.type || 'image/jpeg' });
    if (erreurUpload) { console.error('Upload preuve photo:', erreurUpload); return null; }

    const DIX_ANS = 315360000;
    const { data: signee, error: erreurSignee } = await nexusClient.storage
      .from('preuves-missions')
      .createSignedUrl(chemin, DIX_ANS);
    if (erreurSignee) { console.error('URL signée preuve photo:', erreurSignee); return null; }
    return signee.signedUrl;
  }

  const POINTS_PAR_PRIORITE = {critique:10, haute:7, normale:5, basse:3};

  // ------------------------------------------------------------
  // Conseiller NEXUS côté employé (21/07/2026, demande de Frédéric) —
  // même avatar, même voix que côté manager, mais adressé directement
  // à la personne connectée. Règle non négociable héritée du Conseiller
  // Contextuel : jamais un chiffre ou un compliment qui ne vient pas
  // d'une donnée réelle. Tout ce qui suit est calculé depuis
  // completionsCache (les missions RÉELLEMENT validées par cet
  // employé, déjà chargées) — rien n'est estimé ni décoratif.
  // ------------------------------------------------------------
  const PALIERS_MISSIONS = [10, 25, 50, 100, 200, 500];

  function calculerStatsPersonnelles(completions) {
    const parJour = {};
    completions.forEach(c => {
      if (!parJour[c.date]) parJour[c.date] = 0;
      parJour[c.date] += 1;
    });

    // Streak : jours consécutifs avec au moins une mission validée, en
    // remontant depuis aujourd'hui. Si rien n'est encore validé
    // aujourd'hui, on part d'hier plutôt que de casser un vrai streak
    // juste parce que la journée vient de commencer.
    const aujISO = new Date().toISOString().slice(0, 10);
    let curseur = new Date();
    if (!parJour[aujISO]) curseur.setDate(curseur.getDate() - 1);
    let streak = 0;
    while (true) {
      const iso = curseur.toISOString().slice(0, 10);
      if (parJour[iso]) { streak += 1; curseur.setDate(curseur.getDate() - 1); } else break;
    }

    const now = new Date();
    const jourSemaineISO = (now.getDay() + 6) % 7; // 0 = lundi
    const lundi = new Date(now);
    lundi.setDate(now.getDate() - jourSemaineISO);
    const lundiISO = lundi.toISOString().slice(0, 10);
    const completionsSemaine = completions.filter(c => c.date >= lundiISO);
    const missionsSemaine = completionsSemaine.length;
    const pointsSemaine = completionsSemaine.reduce((s, c) => s + (c.points || 0), 0);

    const totalMissions = completions.length;
    const totalAvantAujourdhui = totalMissions - (parJour[aujISO] || 0);
    const palierFrancheAujourdhui = PALIERS_MISSIONS.find(p => totalAvantAujourdhui < p && totalMissions >= p) || null;
    const prochainPalier = PALIERS_MISSIONS.find(p => totalMissions < p) || null;

    return { streak, missionsSemaine, pointsSemaine, totalMissions, palierFrancheAujourdhui, prochainPalier };
  }

  function messageConseillerPerso(stats, prenom) {
    if (stats.palierFrancheAujourdhui) {
      return `${stats.palierFrancheAujourdhui}ᵉ mission validée aujourd'hui, ${prenom} — un vrai cap franchi. Continuez comme ça.`;
    }
    if (stats.streak >= 5) {
      return `${stats.streak} jours de suite avec au moins une mission validée — belle régularité, ${prenom}.`;
    }
    if (stats.streak >= 2) {
      return `${stats.streak} jours d'affilée avec une mission validée. On continue ?`;
    }
    if (stats.missionsSemaine > 0) {
      return `${stats.missionsSemaine} mission${stats.missionsSemaine > 1 ? 's' : ''} validée${stats.missionsSemaine > 1 ? 's' : ''} cette semaine, pour ${stats.pointsSemaine} points.`;
    }
    return `Aucune mission validée pour l'instant cette semaine, ${prenom} — un coup d'œil à celles du jour ?`;
  }

  function renderConseillerPerso(stats, prenom) {
    const el = document.getElementById('conseillerPersoSection');
    if (!el) return;

    let palierHtml;
    if (stats.prochainPalier) {
      const precedent = [...PALIERS_MISSIONS].reverse().find(p => p < stats.prochainPalier) || 0;
      const pct = Math.min(100, Math.round(((stats.totalMissions - precedent) / (stats.prochainPalier - precedent)) * 100));
      palierHtml = `
        <div class="conseiller-perso-palier">
          <div class="conseiller-perso-palier-ligne"><span>${stats.totalMissions} missions au total</span><span>Prochain palier : ${stats.prochainPalier}</span></div>
          <div class="conseiller-perso-bar-track"><div class="conseiller-perso-bar" style="width:${pct}%;"></div></div>
        </div>`;
    } else {
      palierHtml = `<div class="conseiller-perso-palier conseiller-perso-palier-ligne">${stats.totalMissions} missions validées au total — tous les paliers actuels atteints.</div>`;
    }

    el.innerHTML = `
      <div class="conseiller-perso">
        <div class="conseiller-perso-head">
          <img class="conseiller-perso-avatar" src="assets/nexus-avatar.png" alt="Conseiller NEXUS">
          <div>
            <div class="conseiller-perso-nom">CONSEILLER NEXUS</div>
            <div class="conseiller-perso-sous">Votre progression</div>
          </div>
        </div>
        <div class="conseiller-perso-texte">${messageConseillerPerso(stats, prenom)}</div>
        ${palierHtml}
      </div>`;
  }

  function toutCoche(mission) {
    return mission.checklist.every((_, i) => checkState[`${mission.mission_id}_${i}`]);
  }

  function renderMissionCard(m, isAuto) {
    const priorite = m.priority || 'normale';
    const complet = toutCoche(m);
    const controle = !isAuto && estMissionControleManager(m);
    const completionAujourdhui = completionsCache.find(c => c.mission_id === m.mission_id && c.date === new Date().toISOString().slice(0,10));
    const dejaValidee = !!completionAujourdhui;

    const libelleBouton = complet
      ? (controle ? 'Valider le contrôle' : 'Valider la mission')
      : (controle ? 'Cochez tout pour valider le contrôle' : 'Cochez tout pour valider');

    const blocPresence = controle ? `
        <div class="presence-label">Employés présents au moment du contrôle</div>
        ${EMPLOYES_SITE.length === 0
          ? `<div class="mission-pourquoi" style="margin:4px 0;">Aucun employé actif trouvé pour ce site.</div>`
          : EMPLOYES_SITE.map(e => {
              const key = `${m.mission_id}_${e.id}`;
              const checked = !!presentsState[key];
              return `<div class="presence-item" data-key="${key}">
                <div class="presence-box ${checked?'checked':''}">${checked?'✓':''}</div>
                <div>${e.nom}</div>
              </div>`;
            }).join('')}` : '';

    const liensEvaluer = (controle && dejaValidee && completionAujourdhui.employes_presents && completionAujourdhui.employes_presents.length)
      ? `<div class="evaluer-liens">${completionAujourdhui.employes_presents.map(pid => {
          const emp = EMPLOYES_SITE.find(e => e.id === pid);
          return emp ? `<a class="evaluer-lien" href="NEXUS-Evaluation-Employe-v1.html?employe=${emp.id}">→ Évaluer ${emp.nom}</a>` : '';
        }).join('')}</div>`
      : '';

    return `
      <div class="mission-card">
        <div class="mission-head" data-id="${m.mission_id}">
          <div>
            <div class="mission-titre">${m.titre}</div>
            <div class="mission-meta">${m.famille || 'Auto'} · ${m.estimated_duration_min} min${isAuto && m.impact_attendu_eur ? ' · Impact ' + m.impact_attendu_eur + '€' : ''}</div>
          </div>
          ${isAuto ? '<span class="badge badge-auto">Conseiller NEXUS</span>' : (controle ? '<span class="badge badge-controle">🔍 Contrôle</span>' : priorityBadge(priorite))}
        </div>
        <div class="mission-body ${missionsOuvertes.has(m.mission_id)?'open':''}" id="body-${m.mission_id}">
          ${controle ? `<div class="controle-banner">🔍 Mode contrôle manager — vous vérifiez que l'équipe a bien réalisé ces points, vous ne les faites pas vous-même.</div>` : ''}
          <div class="mission-pourquoi">${m.pourquoi}</div>
          ${renderChecklist(m.mission_id, m.checklist)}
          ${m.proof_required ? `<div class="mission-photo">📷 Photo requise pour valider</div>
            <input type="file" accept="image/*" capture="environment" id="photo-${m.mission_id}" style="display:none;">` : ''}
          ${blocPresence}
          ${dejaValidee
            ? `<div class="validation-ok">✓ ${controle ? 'Contrôlée' : 'Validée'} aujourd'hui</div>${liensEvaluer}`
            : `<button class="btn-valider" data-mission="${m.mission_id}" ${!complet?'disabled':''}>${libelleBouton}</button>`}
        </div>
      </div>`;
  }

  function render() {
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent === familleActive));
    const q = document.getElementById('search').value.trim().toLowerCase();
    const content = document.getElementById('content');

    let html = '';

    // Les recommandations du Conseiller NEXUS s'adressent au manager, pas aux employés —
    // c'est lui qui décide ensuite de déléguer une mission.
    if (!q && roleDuJour === 'manager') {
      html += `<div class="section-label">Aujourd'hui — recommandé par le Conseiller NEXUS</div>`;
      html += `<div id="plansActionMissions"></div>`;
    }

    let lib = catalogue.filter(m => Array.isArray(m.role_required) && m.role_required.includes(roleDuJour));
    lib = lib.filter(m => familleActive==='Toutes' || m.famille===familleActive);
    if (q) lib = lib.filter(m => m.titre.toLowerCase().includes(q) || (m.pourquoi||'').toLowerCase().includes(q));

    html += `<div class="section-label">${q ? 'Résultats' : 'Vos missions — rôle ' + roleDuJour} (${lib.length})</div>`;
    if (lib.length === 0) {
      html += `<div class="empty-note">Aucune mission ne correspond à votre rôle du jour.</div>`;
    } else {
      lib.forEach(m => html += renderMissionCard(m, m.mission_id.startsWith('MISSION-')));
    }

    content.innerHTML = html;
    if (roleDuJour === 'manager') renderPlansActionMissions();

    content.querySelectorAll('.mission-head').forEach(el => {
      el.addEventListener('click', () => {
        const id = el.dataset.id;
        if (missionsOuvertes.has(id)) missionsOuvertes.delete(id); else missionsOuvertes.add(id);
        document.getElementById(`body-${id}`).classList.toggle('open');
      });
    });
    content.querySelectorAll('.check-item').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        const key = el.dataset.key;
        checkState[key] = !checkState[key];
        render(); // re-rendu immédiat (optimiste) pour activer/desactiver le bouton Valider

        const lastUnderscore = key.lastIndexOf('_');
        const missionId = key.slice(0, lastUnderscore);
        const idx = parseInt(key.slice(lastUnderscore + 1), 10);
        sauvegarderProgressionItem(employeeId, missionId, idx, checkState[key]);
      });
    });
    content.querySelectorAll('.presence-item').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        const key = el.dataset.key;
        presentsState[key] = !presentsState[key];
        render();
      });
    });

    content.querySelectorAll('.btn-valider').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const missionId = btn.dataset.mission;
        const mission = catalogue.find(m => m.mission_id === missionId);
        if (!mission) return;

        const libelleInitial = btn.textContent;
        const controle = estMissionControleManager(mission);

        const finaliser = async (file) => {
          if (mission.proof_required && !file) {
            alert('Photo requise — la mission ne peut pas être validée sans preuve.');
            return;
          }

          let photoUrl = null;
          if (file) {
            btn.disabled = true;
            btn.textContent = 'Envoi de la photo…';
            photoUrl = await uploaderPreuvePhoto(missionId, file);
            if (mission.proof_required && !photoUrl) {
              alert("Erreur lors de l'envoi de la photo — réessayez. La mission n'a pas été validée.");
              btn.disabled = false;
              btn.textContent = libelleInitial;
              return;
            }
          }

          const points = mission.proof_required ? (mission.points || 5) + 2 : (mission.points || 5);
          const employesPresents = controle
            ? EMPLOYES_SITE.filter(e => presentsState[`${missionId}_${e.id}`]).map(e => e.id)
            : null;
          const entry = {
            mission_id: missionId, titre: mission.titre,
            date: new Date().toISOString().slice(0,10), heure: new Date().toTimeString().slice(0,5),
            photo_fournie: !!photoUrl, photo_url: photoUrl, points,
            employes_presents: employesPresents,
          };
          completionsCache.push(entry); // re-rendu optimiste
          render();
          renderConseillerPerso(calculerStatsPersonnelles(completionsCache), employeActuel);
          sauvegarderCompletionSupabase(employeeId, entry);
        };

        if (mission.proof_required) {
          const input = document.getElementById(`photo-${missionId}`);
          input.onchange = () => finaliser(input.files && input.files[0]);
          input.click();
        } else {
          finaliser(null);
        }
      });
    });
  }

  nexusRequireAuth().then(async employee => {
    if (!employee) return; // nexus-auth.js gère déjà la redirection vers NEXUS-Login-v1.html

    employeActuel = employee.nom;
    employeeId = employee.id;
    SITE_ACTUEL = employee.site_id || 'vito-sainte-marie';

    if (!employee.consultation_externe) {
      roleDuJour = await chargerShiftAujourdhui(employeeId);
      if (!roleDuJour) {
        window.location.href = 'NEXUS-Prise-De-Poste-v1.html';
        return;
      }
    } else {
      roleDuJour = 'manager'; // vue d'ensemble par defaut pour une consultation externe
    }

    document.querySelector('.eyebrow').textContent = roleDuJour === 'manager' ? "NEXUS · Plans d'action" : 'NEXUS · Missions';
    document.querySelector('.title').textContent = roleDuJour === 'manager' ? "Vos plans d'action" : 'Vos missions du jour';

    // Lien permanent pour refaire la prise de poste volontairement (erreur
    // de saisie, changement de rôle en cours de journée...) — la prise de
    // poste reste valable 24h automatiquement, mais ne doit jamais bloquer
    // une correction manuelle. Demande de Frédéric le 21/07/2026.
    if (!employee.consultation_externe) {
      document.getElementById('roleJourLigne').innerHTML =
        `Rôle du jour : ${roleDuJour} · <a href="NEXUS-Prise-De-Poste-v1.html">Changer de rôle / refaire la prise de poste</a>`;
    }

    catalogue = await chargerCatalogue();
    checkState = await chargerProgressionSupabase(employeeId);
    completionsCache = await chargerCompletionsSupabase(employeeId);
    renderConseillerPerso(calculerStatsPersonnelles(completionsCache), employee.nom);
    if (roleDuJour === 'manager') {
      EMPLOYES_SITE = await chargerEmployesSite();
      PLANS_ACTION = await construirePlansAction();
    }

    const tabsEl = document.getElementById('tabs');
    FAMILLES.forEach(f => {
      const t = document.createElement('div');
      t.className = 'tab' + (f===familleActive ? ' active' : '');
      t.textContent = f;
      t.onclick = () => { familleActive = f; render(); };
      tabsEl.appendChild(t);
    });

    document.getElementById('search').addEventListener('input', render);

    render();

    // Rappel carburant — meme source unique de verite que HOME (le resultat
    // deja calcule dans Parametres Rappels), injecte une seule fois au
    // chargement, pas a chaque re-rendu de la liste.
    (async function injecterRappelCarburantMissions() {
      try {
        const derniereRecommandation = JSON.parse(localStorage.getItem('nexus_derniere_recommandation_carburant') || 'null');
        if (!derniereRecommandation) return;
        const aujourdISO = new Date().toISOString().slice(0,10);
        if (derniereRecommandation.date !== aujourdISO) return;
        if (derniereRecommandation.action !== 'COMMANDER') return;

        const r = derniereRecommandation;
        const total = (r.qSP||0) + (r.qGO||0);
        PLANS_ACTION.unshift({
          etat: r.mode === 'CAMION_COMPLET' ? "🔥 À AGIR" : "🔴 À DÉCIDER",
          candidate_id: "RAPPEL-CARBU-" + r.date,
          recommandation: `Je vous recommande de commander le carburant aujourd'hui — ${r.qSP>0?`Sans Plomb ~${r.qSP.toLocaleString('fr-FR')} L`:''}${r.qSP>0&&r.qGO>0?', ':''}${r.qGO>0?`Gasoil ~${r.qGO.toLocaleString('fr-FR')} L`:''}.`,
          situation: `Calcul réalisé aujourd'hui dans Paramètres Rappels : ${r.mode === 'CAMION_COMPLET' ? 'camion complet visé' : 'complément de sécurité'} (${total.toLocaleString('fr-FR')} L au total).`,
          contexte: r.message,
          analyse: "Ce résultat vient directement du calcul complet — pas d'une version simplifiée.",
          consequence: `Commande à passer le ${r.dateCommande} pour livraison le ${r.dateLivraison}.`,
          impact: "Vous évitez une rupture tout en respectant la règle de stock minimal en fin de mois.",
        });
        await renderPlansActionMissions();
      } catch (err) { console.error('Rappel carburant:', err); }
    })();
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — Résultats Équipe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0F14; --panel:#141B22; --panel-raised:#1A222C; --hairline:#242E38;
    --text:#EDF1F5; --text-mid:#8A96A5; --text-dim:#57626F;
    --green:#34D399; --green-dim:#153629;
    --amber:#F5A623; --amber-dim:#3A2E14;
    --cyan:#4FC3D9;
    --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:var(--bg); font-family:var(--sans); color:var(--text);}
  body{display:flex; justify-content:center; min-height:100vh;}
  .phone{width:100%; max-width:460px; min-height:100vh; display:flex; flex-direction:column; border-left:1px solid var(--hairline); border-right:1px solid var(--hairline);}

  .header{padding:20px 20px 14px; position:relative;}
  .menu-btn{
    position:absolute; top:18px; right:18px; display:flex; align-items:center; gap:6px;
    font-family:var(--mono); font-size:10.5px; font-weight:600; letter-spacing:0.03em; text-transform:uppercase;
    color:var(--cyan); background:rgba(79,195,217,0.1); border:1px solid rgba(79,195,217,0.3);
    border-radius:20px; padding:7px 12px; text-decoration:none; white-space:nowrap; z-index:5;
  }
  .menu-btn:active{background:rgba(79,195,217,0.2);}

  .eyebrow{font-family:var(--mono); font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--cyan);}
  .title{font-size:20px; font-weight:600; margin-top:4px;}
  .divider{height:1px; background:var(--hairline); margin:0 20px;}

  .section{padding:16px 20px;}
  .card{background:var(--panel); border:1px solid var(--hairline); border-radius:12px; padding:18px; margin-bottom:14px;}
  .section-label{font-family:var(--mono); font-size:10.5px; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-dim); margin-bottom:12px; display:flex; align-items:center; gap:8px;}
  .section-label::after{content:''; flex:1; height:1px; background:var(--hairline);}

  .emp-row{padding:12px 0; border-bottom:1px solid var(--hairline);}
  .emp-row:last-child{border-bottom:none;}
  .emp-head{display:flex; justify-content:space-between; align-items:center;}
  .emp-name{font-size:14px; font-weight:600;}
  .emp-pct{font-family:var(--mono); font-size:14px; font-weight:700;}
  .bar-track{height:6px; background:var(--panel-raised); border-radius:3px; overflow:hidden; margin-top:8px;}
  .bar-fill{height:100%; background:var(--cyan); border-radius:3px;}
  .emp-detail{font-family:var(--mono); font-size:10px; color:var(--text-dim); margin-top:5px;}

  .empty-note{padding:30px 20px; text-align:center; color:var(--text-dim); font-size:12.5px; line-height:1.6;}
  footer{margin-top:auto; padding:16px 20px 24px; font-family:var(--mono); font-size:10px; color:var(--text-dim); text-align:center; border-top:1px solid var(--hairline);}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="nexus-auth.js"></script>
</head>
<body>
<div class="phone">
  <div class="header">
    <a href="NEXUS-App-v1.html" class="menu-btn">☰ Menu</a>
    <div class="eyebrow">NEXUS · Manager</div>
    <div class="title">Résultats Équipe</div>
  </div>
  <div class="divider"></div>
  <div class="section" id="content"></div>
  <footer>NEXUS Résultats Équipe v1 · Missions et retards sur Supabase · Vito Sainte-Marie Usine</footer>
</div>

<script>
  // Source authentique des missions : Supabase (mission_completions), la table que
  // NEXUS-Missions-v1.html ecrit reellement depuis son passage a Supabase. L'ancienne
  // lecture depuis localStorage('nexus_missions_completees') a ete retiree ici — plus
  // personne n'ecrit dans cette cle, l'ecran affichait donc des donnees perimees ou
  // vides (corrige le 14/07/2026). Les pointages/retards restent sur localStorage,
  // Pointage n'ayant pas encore de table Supabase dediee.
  async function chargerCompletions() {
    const { data, error } = await nexusClient.from('mission_completions').select('*').order('date', { ascending: false });
    if (error) { console.error('Chargement mission_completions:', error); return []; }
    return data || [];
  }
  async function chargerEquipeActive() {
    const { data, error } = await nexusClient.from('employees').select('id, nom').eq('actif', true).order('nom');
    if (error) { console.error('Chargement employees:', error); return []; }
    return data || [];
  }

  nexusRequireAuth().then(async employee => {
    if (!employee) return; // nexus-auth.js gère déjà la redirection vers NEXUS-Login-v1.html
    if (employee.role !== 'manager' && employee.role !== 'gerant') {
      document.body.innerHTML = '<div style="padding:60px 20px; text-align:center; color:var(--text-dim); font-family:var(--sans);">Cet écran est réservé aux managers.</div>';
      return;
    }
    const session = { prenom: employee.nom, role: employee.role };


  const [equipeActive, completions, { data: pointagesRetard, error: erreurPointages }] = await Promise.all([
    chargerEquipeActive(), chargerCompletions(),
    nexusClient.from('pointages').select('employee_id, date, retard_min').eq('type', 'arrivee').gt('retard_min', 0).order('date', { ascending: false }),
  ]);
  if (erreurPointages) console.error('Chargement pointages:', erreurPointages);
  const nomParId = {};
  equipeActive.forEach(e => { nomParId[e.id] = e.nom; });
  // Regroupe les retards par employe, meme forme que l'ancien objet localStorage
  // nexus_retards, mais alimente desormais par Supabase (tous appareils confondus).
  const retards = {};
  (pointagesRetard || []).forEach(p => {
    const nom = nomParId[p.employee_id];
    if (!nom) return;
    if (!retards[nom]) retards[nom] = [];
    retards[nom].push({ date: p.date, retard_min: p.retard_min });
  });
  const content = document.getElementById('content');

  const employesEquipe = equipeActive.map(e => e.nom);
  const employesCompletions = [...new Set(completions.map(c => nomParId[c.employee_id]).filter(Boolean))];
  const employesRetards = Object.keys(retards);
  const tousEmployes = [...new Set([...employesEquipe, ...employesCompletions, ...employesRetards])];

  if (tousEmployes.length === 0) {
    content.innerHTML = `<div class="card"><div class="empty-note">
      Aucune activité enregistrée pour l'instant.<br><br>
      Dès qu'un employé pointe ou valide une mission, ses résultats apparaîtront ici.
    </div></div>`;
  } else {
    let html = '';
    tousEmployes.forEach(emp => {
      const idEmp = equipeActive.find(e => e.nom === emp)?.id;
      const missionsEmp = completions.filter(c => c.employee_id === idEmp);
      const pointsTotal = missionsEmp.reduce((s, m) => s + (m.points || 0), 0);
      const avecPhoto = missionsEmp.filter(m => m.photo_fournie).length;
      const retardsEmp = retards[emp] || [];
      const totalRetardMin = retardsEmp.reduce((s, r) => s + r.retard_min, 0);

      let etat = '🟢 SOUS CONTRÔLE', etatCouleur = '#34D399';
      if (retardsEmp.length >= 3) { etat = '🟡 À SURVEILLER'; etatCouleur = '#F5A623'; }
      if (missionsEmp.length === 0 && retardsEmp.length === 0) { etat = '💡 À DÉMARRER'; etatCouleur = '#4FC3D9'; }

      html += `<div class="card" style="border-left:3px solid ${etatCouleur};">
        <div class="emp-head" style="margin-bottom:10px;">
          <div>
            <span class="emp-name" style="font-size:15px;">${emp}</span>
            <div style="font-family:var(--mono); font-size:9.5px; color:${etatCouleur}; margin-top:3px;">${etat}</div>
          </div>
          <span class="emp-pct" style="color:var(--cyan);">${pointsTotal} pts</span>
        </div>
        <div class="emp-detail" style="margin-bottom:10px;">
          ${missionsEmp.length} mission(s) validée(s) · ${avecPhoto} avec preuve photo · ${retardsEmp.length} retard(s) (${totalRetardMin} min cumulées)
        </div>`;

      if (missionsEmp.length > 0) {
        html += `<div style="margin-top:10px;">`;
        missionsEmp.slice(0, 5).forEach(m => {
          html += `<div class="histo-row" style="border-bottom:1px solid var(--hairline); padding:7px 0;">
            <span style="font-size:11.5px;">${m.titre} ${m.photo_fournie ? '📷' : ''}</span>
            <span style="font-family:var(--mono); font-size:10.5px; color:var(--green);">+${m.points} pts</span>
          </div>`;
        });
        html += `</div>`;
      }

      if (retardsEmp.length > 0) {
        html += `<div class="section-label" style="margin-top:14px;">Retards</div>`;
        retardsEmp.slice(0, 5).forEach(r => {
          html += `<div class="histo-row" style="border-bottom:1px solid var(--hairline); padding:7px 0;">
            <span style="font-size:11.5px;">${r.date}</span>
            <span style="font-family:var(--mono); font-size:10.5px; color:var(--red);">+${r.retard_min} min</span>
          </div>`;
        });
      }
      html += `</div>`;
    });

    html += `<div class="card"><div class="section-label">Source des données</div>
      <div class="empty-note" style="padding:8px 0; text-align:left;">
        Missions et retards viennent tous les deux de Supabase désormais — fiables pour toute l'équipe, tous appareils confondus (migration Pointage terminée le 15/07/2026).
      </div></div>`;

    content.innerHTML = html;
  }

});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — Résultats Équipe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0F14; --panel:#141B22; --panel-raised:#1A222C; --hairline:#242E38;
    --text:#EDF1F5; --text-mid:#8A96A5; --text-dim:#57626F;
    --green:#34D399; --green-dim:#153629;
    --amber:#F5A623; --amber-dim:#3A2E14;
    --cyan:#4FC3D9;
    --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:var(--bg); font-family:var(--sans); color:var(--text);}
  body{display:flex; justify-content:center; min-height:100vh;}
  .phone{width:100%; max-width:460px; min-height:100vh; display:flex; flex-direction:column; border-left:1px solid var(--hairline); border-right:1px solid var(--hairline);}

  .header{padding:20px 20px 14px;}
  .eyebrow{font-family:var(--mono); font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--cyan);}
  .title{font-size:20px; font-weight:600; margin-top:4px;}
  .divider{height:1px; background:var(--hairline); margin:0 20px;}

  .section{padding:16px 20px;}
  .card{background:var(--panel); border:1px solid var(--hairline); border-radius:12px; padding:18px; margin-bottom:14px;}
  .section-label{font-family:var(--mono); font-size:10.5px; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-dim); margin-bottom:12px; display:flex; align-items:center; gap:8px;}
  .section-label::after{content:''; flex:1; height:1px; background:var(--hairline);}

  .emp-row{padding:12px 0; border-bottom:1px solid var(--hairline);}
  .emp-row:last-child{border-bottom:none;}
  .emp-head{display:flex; justify-content:space-between; align-items:center;}
  .emp-name{font-size:14px; font-weight:600;}
  .emp-pct{font-family:var(--mono); font-size:14px; font-weight:700;}
  .bar-track{height:6px; background:var(--panel-raised); border-radius:3px; overflow:hidden; margin-top:8px;}
  .bar-fill{height:100%; background:var(--cyan); border-radius:3px;}
  .emp-detail{font-family:var(--mono); font-size:10px; color:var(--text-dim); margin-top:5px;}

  .empty-note{padding:30px 20px; text-align:center; color:var(--text-dim); font-size:12.5px; line-height:1.6;}
  footer{margin-top:auto; padding:16px 20px 24px; font-family:var(--mono); font-size:10px; color:var(--text-dim); text-align:center; border-top:1px solid var(--hairline);}
</style>
</head>
<body>
<div class="phone">
  <div class="header">
    <div class="eyebrow">NEXUS · Manager</div>
    <div class="title">Résultats Équipe</div>
  </div>
  <div class="divider"></div>
  <div class="section" id="content"></div>
  <footer>NEXUS Résultats Équipe v1 · Basé sur les cases cochées sur cet appareil</footer>
</div>

<script>
  const session = JSON.parse(localStorage.getItem('nexus_session') || 'null');
  if (!session || session.role !== 'manager') { window.location.href = 'NEXUS-Login-v1.html'; }

  const progression = JSON.parse(localStorage.getItem('nexus_missions_progression') || '{}');
  const completions = JSON.parse(localStorage.getItem('nexus_missions_completees') || '[]');
  const retards = JSON.parse(localStorage.getItem('nexus_retards') || '{}');
  const content = document.getElementById('content');

  const employesProgression = Object.keys(progression);
  const employesCompletions = [...new Set(completions.map(c => c.employe))];
  const employesRetards = Object.keys(retards);
  const tousEmployes = [...new Set([...employesProgression, ...employesCompletions, ...employesRetards])];

  if (tousEmployes.length === 0) {
    content.innerHTML = `<div class="card"><div class="empty-note">
      Aucune activité enregistrée pour l'instant sur cet appareil.<br><br>
      Dès qu'un employé pointe, valide une mission ou coche des items, ses résultats apparaîtront ici.
    </div></div>`;
  } else {
    let html = '';
    tousEmployes.forEach(emp => {
      const missionsEmp = completions.filter(c => c.employe === emp);
      const pointsTotal = missionsEmp.reduce((s, m) => s + m.points, 0);
      const avecPhoto = missionsEmp.filter(m => m.photo_fournie).length;
      const retardsEmp = retards[emp] || [];
      const totalRetardMin = retardsEmp.reduce((s, r) => s + r.retard_min, 0);

      let etat = '🟢 SOUS CONTRÔLE', etatCouleur = '#34D399';
      if (retardsEmp.length >= 3) { etat = '🟡 À SURVEILLER'; etatCouleur = '#F5A623'; }
      if (missionsEmp.length === 0 && retardsEmp.length === 0) { etat = '💡 À DÉMARRER'; etatCouleur = '#4FC3D9'; }

      html += `<div class="card" style="border-left:3px solid ${etatCouleur};">
        <div class="emp-head" style="margin-bottom:10px;">
          <div>
            <span class="emp-name" style="font-size:15px;">${emp}</span>
            <div style="font-family:var(--mono); font-size:9.5px; color:${etatCouleur}; margin-top:3px;">${etat}</div>
          </div>
          <span class="emp-pct" style="color:var(--cyan);">${pointsTotal} pts</span>
        </div>
        <div class="emp-detail" style="margin-bottom:10px;">
          ${missionsEmp.length} mission(s) validée(s) · ${avecPhoto} avec preuve photo · ${retardsEmp.length} retard(s) (${totalRetardMin} min cumulées)
        </div>`;

      if (missionsEmp.length > 0) {
        html += `<div style="margin-top:10px;">`;
        missionsEmp.slice(-5).reverse().forEach(m => {
          html += `<div class="histo-row" style="border-bottom:1px solid var(--hairline); padding:7px 0;">
            <span style="font-size:11.5px;">${m.titre} ${m.photo_fournie ? '📷' : ''}</span>
            <span style="font-family:var(--mono); font-size:10.5px; color:var(--green);">+${m.points} pts</span>
          </div>`;
        });
        html += `</div>`;
      }

      if (retardsEmp.length > 0) {
        html += `<div class="section-label" style="margin-top:14px;">Retards</div>`;
        retardsEmp.slice(-5).reverse().forEach(r => {
          html += `<div class="histo-row" style="border-bottom:1px solid var(--hairline); padding:7px 0;">
            <span style="font-size:11.5px;">${r.date}</span>
            <span style="font-family:var(--mono); font-size:10.5px; color:var(--red);">+${r.retard_min} min</span>
          </div>`;
        });
      }
      html += `</div>`;
    });

    html += `<div class="card"><div class="section-label">Limite honnête</div>
      <div class="empty-note" style="padding:8px 0; text-align:left;">
        Ces chiffres ne sont fiables que si toute l'équipe utilise ce même appareil pour pointer et valider ses missions (décision actée le 08/07/2026).
      </div></div>`;

    content.innerHTML = html;
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — Rayon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0F14; --panel:#141B22; --panel-raised:#1A222C; --hairline:#242E38;
    --text:#EDF1F5; --text-mid:#8A96A5; --text-dim:#57626F;
    --green:#34D399; --green-dim:#153629;
    --amber:#F5A623; --amber-dim:#3A2E14;
    --red:#F0575A; --red-dim:#3A1D1F;
    --cyan:#4FC3D9;
    --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:var(--bg); font-family:var(--sans); color:var(--text);}
  body{display:flex; justify-content:center; min-height:100vh;}
  .phone{width:100%; max-width:460px; min-height:100vh; display:flex; flex-direction:column; border-left:1px solid var(--hairline); border-right:1px solid var(--hairline);}

  .header{padding:20px 20px 14px;}
  .eyebrow{font-family:var(--mono); font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--cyan);}
  .title{font-size:20px; font-weight:600; margin-top:4px;}
  .divider{height:1px; background:var(--hairline); margin:0 20px;}

  .tabs{display:flex; gap:8px; padding:14px 20px;}
  .tab{
    flex:1; text-align:center; padding:10px; border-radius:8px; font-size:13px; font-weight:600;
    background:var(--panel); border:1px solid var(--hairline); cursor:pointer; color:var(--text-mid);
  }
  .tab.active{background:rgba(79,195,217,0.12); border-color:var(--cyan); color:var(--cyan);}

  .section{padding:0 20px 20px;}
  .card{background:var(--panel); border:1px solid var(--hairline); border-radius:12px; padding:18px; margin-top:14px;}

  .kpi-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .kpi-box{background:var(--panel-raised); border-radius:8px; padding:14px;}
  .kpi-box .kl{font-family:var(--mono); font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.04em;}
  .kpi-box .kv{font-family:var(--mono); font-size:19px; font-weight:700; margin-top:5px;}
  .kv.up{color:var(--green);} .kv.down{color:var(--red);}

  .section-label{font-family:var(--mono); font-size:10.5px; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-dim); margin-bottom:12px; display:flex; align-items:center; gap:8px;}
  .section-label::after{content:''; flex:1; height:1px; background:var(--hairline);}

  .rank-row{display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid var(--hairline); font-size:12.5px;}
  .rank-row:last-child{border-bottom:none;}
  .rank-name{flex:1; padding-right:10px;}
  .rank-val{font-family:var(--mono); color:var(--green); white-space:nowrap;}
  .rank-val.weak{color:var(--red);}

  .gap-row{display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--hairline); font-size:12.5px;}
  .gap-row:last-child{border-bottom:none;}
  .gap-label{color:var(--text-mid);}
  .gap-status{font-family:var(--mono); font-size:10px; color:var(--text-dim); text-align:right; max-width:180px;}

  footer{margin-top:auto; padding:16px 20px 24px; font-family:var(--mono); font-size:10px; color:var(--text-dim); text-align:center; border-top:1px solid var(--hairline);}
</style>
</head>
<body>
<div class="phone">
  <div class="header">
    <div class="eyebrow">NEXUS · Rayon</div>
    <div class="title" id="rayonTitle">Vue d'ensemble</div>
  </div>
  <div class="divider"></div>

  <div class="tabs" id="tabs"></div>

  <div class="section" id="content"></div>

  <footer>NEXUS Rayon v1 · Données réelles S1 2026 · Vito Sainte-Marie Usine</footer>
</div>

<script>
  const RAYONS = {"Bières": {"nom": "Bières, Cidres et Panachés", "nb_references": 60, "ca_total": 71086.22, "marge_total": 36144.36, "marge_pct_moyenne": 0.5085, "evolution_ca": 0.0683, "top_ventes": [{"article": "Biere Heineken 50cl - 24P", "ca": 9791.22}, {"article": "Biere Heineken 25cl -24P", "ca": 7765.56}, {"article": "Biere Desperados RED 33cl -24P", "ca": 5509.95}, {"article": "Biere Lorraine 50cl -24P", "ca": 5371.4}, {"article": "Biere Desperados 33cl -24P", "ca": 5303.94}], "top_marge": [{"article": "BUZZ VODKA CAN extra strong 10% Plus 250ml -24P", "marge_pct": 0.8392, "ca": 85.8}, {"article": "Bière Lorraine Ice 5.4% 33cl - 24P", "marge_pct": 0.8295, "ca": 41.28}, {"article": "Bière Smirnoff ice 275ml -24P", "marge_pct": 0.5885, "ca": 2162.16}, {"article": "Biere BUZZ cranberry mur rouge 10% 275ml -24P", "marge_pct": 0.5882, "ca": 77.22}, {"article": "Biere Lorraine 25cl - 24P", "marge_pct": 0.5638, "ca": 889.14}], "produits_faibles": [{"article": "Bière Rude Boy Tonic wine Caramel Vanille 275ml - 12P", "ca": 5.99}, {"article": "Pack Heineken 00 25cl - 6P", "ca": 11.52}, {"article": "Pack Guinness 27.5cl - 6P", "ca": 17.97}, {"article": "Hard Cider Mordue Original - 18P", "ca": 33.92}, {"article": "LE COQ cosmo 33CL - 24 p", "ca": 40.6}, {"article": "Bière Lorraine Ice 5.4% 33cl - 24P", "ca": 41.28}], "nb_decisions_actives": 57}, "Softs": {"nom": "Boissons Softs", "nb_references": 168, "ca_total": 97599.15, "marge_total": 47250.88, "marge_pct_moyenne": 0.4841, "evolution_ca": 0.184, "top_ventes": [{"article": "Boisson Coca cola 50cl - 8P", "ca": 6520.92}, {"article": "Jus FRUITYBON Local 50 cl", "ca": 5356.68}, {"article": "Jus caresse 1L ts parf", "ca": 4880.28}, {"article": "Jus caresse 50cl TS PARF", "ca": 4290.84}, {"article": "Chanflor 1.5l -6P", "ca": 2559.16}], "top_marge": [{"article": "Coca Cola zero 50 cl -8P", "marge_pct": 0.6327, "ca": 674.24}, {"article": "Red bull Abricot 25cl -24P", "marge_pct": 0.5994, "ca": 90.5}, {"article": "Red bull 25cl SANS SUCRE -24P", "marge_pct": 0.5773, "ca": 224.44}, {"article": "Eau mabelo 0.50l -P12", "marge_pct": 0.5714, "ca": 129.36}, {"article": "Eau didier gazeux 50 cl -8P", "marge_pct": 0.5669, "ca": 778.72}], "produits_faibles": [{"article": "MIMI GINGER GROSEILLE PEYI 50cl", "ca": 3.43}, {"article": "Red Bull Pastèque 25cl -24P", "ca": 3.62}, {"article": "Boisson Monster Energy Rossi 50cl -12P", "ca": 3.82}, {"article": "MIMI CITRONNADE 50cl", "ca": 6.86}, {"article": "XL energy drink -24P", "ca": 12.75}, {"article": "Eau Lafort pétillante 50cl - 8P", "ca": 21.24}, {"article": "Jus Tropicana Tropical Can 33cl-24P", "ca": 23.5}, {"article": "Eau didier menthe 1.25cl -6P", "ca": 32.88}], "nb_decisions_actives": 160}};
  const tabsEl = document.getElementById('tabs');
  const contentEl = document.getElementById('content');
  const titleEl = document.getElementById('rayonTitle');

  function fmtEur(v) { return v.toLocaleString('fr-FR', {minimumFractionDigits:0, maximumFractionDigits:0}) + ' €'; }
  function fmtPct(v) { return (v*100).toFixed(1) + '%'; }

  function renderTabs(active) {
    tabsEl.innerHTML = Object.keys(RAYONS).map(k =>
      `<div class="tab ${k===active?'active':''}" data-rayon="${k}">${k}</div>`
    ).join('');
    tabsEl.querySelectorAll('.tab').forEach(el => {
      el.addEventListener('click', () => showRayon(el.dataset.rayon));
    });
  }

  function showRayon(key) {
    const r = RAYONS[key];
    titleEl.textContent = r.nom;
    renderTabs(key);

    const evolHtml = r.evolution_ca !== null
      ? `<div class="kpi-box"><div class="kl">Évolution T1→T2</div><div class="kv ${r.evolution_ca>=0?'up':'down'}">${r.evolution_ca>=0?'+':''}${fmtPct(r.evolution_ca)}</div></div>`
      : `<div class="kpi-box"><div class="kl">Évolution T1→T2</div><div class="kv" style="color:var(--text-dim); font-size:12px;">Non calculable (T1 partiel)</div></div>`;

    contentEl.innerHTML = `
      <div class="card">
        <div class="kpi-grid">
          <div class="kpi-box"><div class="kl">CA Total S1</div><div class="kv">${fmtEur(r.ca_total)}</div></div>
          <div class="kpi-box"><div class="kl">Marge totale</div><div class="kv">${fmtEur(r.marge_total)}</div></div>
          <div class="kpi-box"><div class="kl">Marge moyenne</div><div class="kv">${fmtPct(r.marge_pct_moyenne)}</div></div>
          ${evolHtml}
        </div>
        <div style="margin-top:10px; font-family:var(--mono); font-size:10.5px; color:var(--text-dim);">
          ${r.nb_references} références · ${r.nb_decisions_actives} décisions actives (Decision Engine)
        </div>
      </div>

      <div class="card">
        <div class="section-label">Top ventes (CA)</div>
        ${r.top_ventes.map((p,i) => `
          <div class="rank-row">
            <span class="rank-name">${i+1}. ${p.article}</span>
            <span class="rank-val">${fmtEur(p.ca)}</span>
          </div>`).join('')}
      </div>

      <div class="card">
        <div class="section-label">Top marge (%)</div>
        ${r.top_marge.map((p,i) => `
          <div class="rank-row">
            <span class="rank-name">${i+1}. ${p.article}</span>
            <span class="rank-val">${fmtPct(p.marge_pct)}</span>
          </div>`).join('')}
      </div>

      <div class="card">
        <div class="section-label">Produits faibles — candidats déréférencement</div>
        ${r.produits_faibles.length ? r.produits_faibles.map((p,i) => `
          <div class="rank-row">
            <span class="rank-name">${p.article}</span>
            <span class="rank-val weak">${fmtEur(p.ca)}</span>
          </div>`).join('') : '<div style="font-size:12.5px; color:var(--text-dim); font-style:italic;">Aucun candidat actuellement.</div>'}
      </div>

      <div class="card">
        <div class="section-label">Ce que NEXUS ne sait pas encore sur ce rayon</div>
        <div class="gap-row"><span class="gap-label">Top rotation réelle</span><span class="gap-status">Proxy CA uniquement — Capability 006</span></div>
        <div class="gap-row"><span class="gap-label">Planogramme complet</span><span class="gap-status">Disponible via Vitrine Scan, par vitrine scannée</span></div>
        <div class="gap-row"><span class="gap-label">Photos du rayon</span><span class="gap-status">Non disponible — pas de photothèque</span></div>
      </div>
    `;
  }

  showRayon(Object.keys(RAYONS)[0]);
</script>
</body>
</html>

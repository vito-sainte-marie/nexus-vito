<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — Prise de poste</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="nexus-auth.js"></script>
<style>
  :root{
    --bg:#0B0F14; --panel:#141B22; --panel-raised:#1A222C; --hairline:#242E38;
    --text:#EDF1F5; --text-mid:#8A96A5; --text-dim:#57626F;
    --green:#34D399; --green-dim:#153629;
    --amber:#F5A623; --amber-dim:#3A2E14;
    --red:#F0575A; --red-dim:#3A1D1F;
    --cyan:#4FC3D9;
    --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:var(--bg); font-family:var(--sans); color:var(--text);}
  body{display:flex; justify-content:center; min-height:100vh;}
  .phone{width:100%; max-width:460px; min-height:100vh; display:flex; flex-direction:column; border-left:1px solid var(--hairline); border-right:1px solid var(--hairline);}

  .header{padding:24px 20px 14px;}
  .eyebrow{font-family:var(--mono); font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--cyan);}
  .title{font-size:22px; font-weight:600; margin-top:4px;}
  .sub{font-size:13px; color:var(--text-mid); margin-top:6px; line-height:1.5;}
  .divider{height:1px; background:var(--hairline); margin:0 20px;}

  .steps{display:flex; gap:6px; padding:14px 20px;}
  .step-dot{flex:1; height:3px; border-radius:2px; background:var(--hairline);}
  .step-dot.done{background:var(--cyan);}

  .section{padding:16px 20px;}

  .role-grid{display:flex; flex-direction:column; gap:10px;}
  .role-card{
    background:var(--panel); border:1.5px solid var(--hairline); border-radius:12px; padding:16px;
    display:flex; align-items:center; gap:14px; cursor:pointer; transition:border-color .12s, background .12s;
  }
  .role-card:active{background:var(--panel-raised);}
  .role-card.selected{border-color:var(--cyan); background:rgba(79,195,217,0.08);}
  .role-icon{width:38px; height:38px; border-radius:10px; background:var(--panel-raised); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0;}
  .role-card.selected .role-icon{background:rgba(79,195,217,0.18);}
  .role-name{font-size:14.5px; font-weight:600;}
  .role-suggestion{font-family:var(--mono); font-size:9.5px; letter-spacing:0.05em; text-transform:uppercase; color:var(--cyan); margin-top:2px;}
  .role-check{margin-left:auto; color:var(--cyan); font-size:18px; opacity:0; transition:opacity .12s;}
  .role-card.selected .role-check{opacity:1;}

  .btn-primary{
    width:100%; padding:14px; border:none; border-radius:10px; font-size:14px; font-weight:600;
    background:var(--cyan); color:#04141a; cursor:pointer; margin-top:18px;
  }
  .btn-primary:disabled{opacity:0.35; cursor:not-allowed;}
  .btn-text{width:100%; padding:12px; border:none; background:none; color:var(--text-dim); font-size:12.5px; cursor:pointer; margin-top:8px;}

  .summary-card{background:var(--panel); border:1px solid var(--hairline); border-radius:14px; padding:20px; margin-top:4px;}
  .summary-role{display:flex; align-items:center; gap:12px; padding-bottom:16px; margin-bottom:16px; border-bottom:1px solid var(--hairline);}
  .summary-role .role-icon{width:44px; height:44px; font-size:20px;}
  .summary-role-name{font-size:16px; font-weight:700;}
  .summary-role-quart{font-family:var(--mono); font-size:11px; color:var(--text-dim); margin-top:2px;}

  .stat-row{display:flex; justify-content:space-between; align-items:center; padding:10px 0;}
  .stat-label{font-size:13px; color:var(--text-mid);}
  .stat-value{font-family:var(--mono); font-size:15px; font-weight:700;}
  .stat-value.amber{color:var(--amber);}
  .stat-value.cyan{color:var(--cyan);}

  .loading{padding:60px 20px; text-align:center; color:var(--text-dim); font-size:13px;}

  .final-card{padding:8px 0;}
  .final-greet{font-size:19px; font-weight:700;}
  .final-line{font-size:13.5px; color:var(--text-mid); margin-top:10px; display:flex; justify-content:space-between;}
  .final-line b{color:var(--text); font-weight:600;}
  .checkmark{width:56px; height:56px; border-radius:50%; background:var(--green-dim); color:var(--green); font-size:26px; display:flex; align-items:center; justify-content:center; margin:0 auto 18px;}

  footer{margin-top:auto; padding:16px 20px 24px; font-family:var(--mono); font-size:10px; color:var(--text-dim); text-align:center; border-top:1px solid var(--hairline);}
</style>
</head>
<body>
<div class="phone">
  <div class="header">
    <div class="eyebrow">NEXUS · Prise de poste</div>
    <div class="title" id="titre">Choisissez votre rôle</div>
    <div class="sub" id="sousTitre">Confirmez le rôle avec lequel vous démarrez ce quart.</div>
  </div>
  <div class="divider"></div>
  <div class="steps">
    <div class="step-dot done"></div>
    <div class="step-dot" id="dot2"></div>
    <div class="step-dot" id="dot3"></div>
  </div>

  <div class="section" id="content">
    <div class="loading">Chargement…</div>
  </div>

  <footer>NEXUS Prise de poste v1 · Vito Sainte-Marie Usine</footer>
</div>

<script>
  const ROLES = [
    { value: 'pompiste',  label: 'Pompiste',  icon: '⛽' },
    { value: 'caissiere', label: 'Caissière',  icon: '💳' },
    { value: 'renfort',   label: 'Renfort',    icon: '🧰' },
    { value: 'polyvalent',label: 'Polyvalent', icon: '🔄' },
    { value: 'manager',   label: 'Manager',    icon: '🧭' },
  ];

  let employeeCourant = null;
  let roleChoisi = null;
  let catalogue = [];

  function roleInfo(value) {
    return ROLES.find(r => r.value === value) || { value, label: value, icon: '❔' };
  }

  function quartDuMoment() {
    const h = new Date().getHours();
    return h < 13 ? 'matin' : 'soir';
  }

  async function chargerCatalogue() {
    const { data, error } = await nexusClient
      .from('mission_catalog')
      .select('mission_id, titre, role_required, priority, estimated_duration_min')
      .eq('actif', true);
    if (error) { console.error('Chargement catalogue:', error); return []; }
    return data || [];
  }

  function missionsPourRole(role) {
    return catalogue.filter(m => Array.isArray(m.role_required) && m.role_required.includes(role));
  }

  function renderChoixRole() {
    document.getElementById('titre').textContent = `Bonjour ${employeeCourant.nom}`;
    document.getElementById('sousTitre').textContent = 'Quel est votre rôle pour ce quart ?';

    const suggestion = employeeCourant.role;
    const html = `
      <div class="role-grid" id="roleGrid">
        ${ROLES.map(r => `
          <div class="role-card ${r.value===roleChoisi?'selected':''}" data-role="${r.value}">
            <div class="role-icon">${r.icon}</div>
            <div>
              <div class="role-name">${r.label}</div>
              ${r.value === suggestion ? '<div class="role-suggestion">Rôle habituel</div>' : ''}
            </div>
            <div class="role-check">✓</div>
          </div>`).join('')}
      </div>
      <button class="btn-primary" id="btnVoirMissions" ${roleChoisi?'':'disabled'}>Voir mes missions</button>
    `;
    document.getElementById('content').innerHTML = html;

    document.querySelectorAll('.role-card').forEach(el => {
      el.addEventListener('click', () => {
        roleChoisi = el.dataset.role;
        renderChoixRole();
      });
    });

    const btn = document.getElementById('btnVoirMissions');
    if (btn) btn.addEventListener('click', () => { if (roleChoisi) renderResume(); });
  }

  function renderResume() {
    document.getElementById('dot2').classList.add('done');
    const info = roleInfo(roleChoisi);
    const missions = missionsPourRole(roleChoisi);
    const nbMissions = missions.length;
    const prioritaires = missions.filter(m => m.priority === 'critique' || m.priority === 'haute').length;
    const tempsTotal = missions.reduce((s, m) => s + (m.estimated_duration_min || 0), 0);
    const quart = quartDuMoment();

    document.getElementById('titre').textContent = 'Votre journée en un coup d\u2019œil';
    document.getElementById('sousTitre').textContent = 'Vérifiez avant de confirmer votre prise de poste.';

    document.getElementById('content').innerHTML = `
      <div class="summary-card">
        <div class="summary-role">
          <div class="role-icon">${info.icon}</div>
          <div>
            <div class="summary-role-name">${info.label}</div>
            <div class="summary-role-quart">Quart ${quart === 'matin' ? 'du matin' : 'du soir'}</div>
          </div>
        </div>
        <div class="stat-row"><span class="stat-label">Missions prévues</span><span class="stat-value">${nbMissions}</span></div>
        <div class="stat-row"><span class="stat-label">Priorités (critique/haute)</span><span class="stat-value amber">${prioritaires}</span></div>
        <div class="stat-row"><span class="stat-label">Temps estimé</span><span class="stat-value cyan">${tempsTotal} min</span></div>
      </div>
      <button class="btn-primary" id="btnConfirmer">Confirmer ma prise de poste</button>
      <button class="btn-text" id="btnChangerRole">← Changer de rôle</button>
    `;

    document.getElementById('btnConfirmer').addEventListener('click', confirmerPriseDePoste);
    document.getElementById('btnChangerRole').addEventListener('click', () => {
      document.getElementById('dot2').classList.remove('done');
      renderChoixRole();
    });
  }

  async function confirmerPriseDePoste() {
    const btn = document.getElementById('btnConfirmer');
    btn.disabled = true;
    btn.textContent = 'Confirmation…';

    const quart = quartDuMoment();
    const { error } = await nexusClient.from('shifts').insert({
      employee_id: employeeCourant.id,
      role: roleChoisi,
      role_prevu: employeeCourant.role,
      confirmed_by: 'employe',
      quart,
      site: 'vito-sainte-marie',
      statut: 'en_cours',
    });

    if (error) {
      console.error('Confirmation prise de poste:', error);
      alert('Un problème est survenu, réessayez.');
      btn.disabled = false;
      btn.textContent = 'Confirmer ma prise de poste';
      return;
    }

    renderFinal();
  }

  function renderFinal() {
    document.getElementById('dot3').classList.add('done');
    const info = roleInfo(roleChoisi);
    const missions = missionsPourRole(roleChoisi);
    const nbMissions = missions.length;
    const prioritaires = missions.filter(m => m.priority === 'critique' || m.priority === 'haute').length;
    const tempsTotal = missions.reduce((s, m) => s + (m.estimated_duration_min || 0), 0);
    const quart = quartDuMoment();

    document.getElementById('titre').textContent = 'Prise de poste confirmée';
    document.getElementById('sousTitre').textContent = '';

    document.getElementById('content').innerHTML = `
      <div class="final-card">
        <div class="checkmark">✓</div>
        <div class="final-greet">Bonjour ${employeeCourant.nom}</div>
        <div class="final-line"><span>Rôle aujourd'hui</span><b>${info.label}</b></div>
        <div class="final-line"><span>Quart</span><b>${quart === 'matin' ? 'Matin' : 'Soir'}</b></div>
        <div class="final-line"><span>Missions prévues</span><b>${nbMissions}</b></div>
        <div class="final-line"><span>Priorités</span><b>${prioritaires} avant votre pause</b></div>
        <div class="final-line"><span>Temps estimé</span><b>${tempsTotal} minutes</b></div>
        <button class="btn-primary" id="btnDashboard">Ouvrir mon tableau de bord</button>
      </div>
    `;

    document.getElementById('btnDashboard').addEventListener('click', () => {
      window.location.href = 'NEXUS-Missions-v1.html';
    });
  }

  nexusRequireAuth().then(async employee => {
    if (!employee) return; // nexus-auth.js gère déjà la redirection vers NEXUS-Login-v1.html
    employeeCourant = employee;
    catalogue = await chargerCatalogue();
    renderChoixRole();
  });
</script>
</body>
</html>

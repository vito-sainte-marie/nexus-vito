<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — Planogramme Manuel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0F14; --panel:#141B22; --panel-raised:#1A222C; --hairline:#242E38;
    --text:#EDF1F5; --text-mid:#8A96A5; --text-dim:#57626F;
    --green:#34D399; --green-dim:#153629;
    --amber:#F5A623; --amber-dim:#3A2E14;
    --red:#F0575A; --red-dim:#3A1D1F;
    --cyan:#4FC3D9;
    --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:var(--bg); font-family:var(--sans); color:var(--text);}
  body{display:flex; justify-content:center; min-height:100vh;}
  .phone{width:100%; max-width:460px; min-height:100vh; display:flex; flex-direction:column; border-left:1px solid var(--hairline); border-right:1px solid var(--hairline);}

  .header{padding:20px 20px 14px; position:relative;}
  .menu-btn{
    position:absolute; top:18px; right:18px; display:flex; align-items:center; gap:6px;
    font-family:var(--mono); font-size:10.5px; font-weight:600; letter-spacing:0.03em; text-transform:uppercase;
    color:var(--cyan); background:rgba(79,195,217,0.1); border:1px solid rgba(79,195,217,0.3);
    border-radius:20px; padding:7px 12px; text-decoration:none; white-space:nowrap; z-index:5;
  }
  .menu-btn:active{background:rgba(79,195,217,0.2);}

  .eyebrow{font-family:var(--mono); font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--cyan);}
  .title{font-size:20px; font-weight:600; margin-top:4px;}
  .subtitle{font-family:var(--mono); font-size:11px; color:var(--text-dim); margin-top:4px;}
  .badge-noia{display:inline-block; margin-top:8px; font-family:var(--mono); font-size:9.5px; padding:3px 9px; border-radius:20px; background:var(--green-dim); color:var(--green);}
  .divider{height:1px; background:var(--hairline); margin:0 20px;}

  .section{padding:16px 20px;}
  .row-input{display:flex; gap:8px; margin-bottom:10px;}
  .row-input input{
    background:var(--panel); border:1px solid var(--hairline); border-radius:8px; padding:11px 12px;
    color:var(--text); font-family:var(--sans); font-size:13.5px;
  }
  .row-input input[name="marque"]{flex:2;}
  .row-input input[name="facing"]{flex:1;}
  .row-input button.remove{
    background:var(--red-dim); color:var(--red); border:none; border-radius:8px; width:38px; cursor:pointer; font-size:16px;
  }

  .btn{
    font-family:var(--sans); font-size:14px; font-weight:600; border:none; border-radius:8px;
    padding:13px 18px; cursor:pointer; width:100%; margin-top:6px;
  }
  .btn-secondary{background:var(--panel); color:var(--text-mid); border:1px solid var(--hairline);}
  .btn-primary{background:var(--cyan); color:#04141a; margin-top:14px;}

  .constraint-box{background:var(--panel); border:1px solid var(--hairline); border-radius:10px; padding:14px; margin-top:14px;}
  .constraint-box label{font-family:var(--mono); font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.04em; display:block; margin-bottom:6px;}
  .constraint-box select, .constraint-box input{
    width:100%; background:var(--panel-raised); border:1px solid var(--hairline); border-radius:6px;
    padding:9px 10px; color:var(--text); font-family:var(--sans); font-size:13px; margin-bottom:10px;
  }

  .result-card{background:var(--panel); border:1px solid var(--hairline); border-radius:10px; padding:14px 16px; margin-top:10px;}
  .result-row{display:flex; justify-content:space-between; align-items:center;}
  .result-brand{font-size:14px; font-weight:600;}
  .result-facing{font-family:var(--mono); font-size:12px; color:var(--text-mid); margin-top:2px;}
  .badge{font-family:var(--mono); font-size:10px; padding:3px 9px; border-radius:20px; font-weight:600; white-space:nowrap;}
  .badge-ok{background:var(--green-dim); color:var(--green);}
  .badge-warn{background:var(--amber-dim); color:var(--amber);}

  .section-label{font-family:var(--mono); font-size:10.5px; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-dim); margin:16px 0 10px; display:flex; align-items:center; gap:8px;}
  .section-label::after{content:''; flex:1; height:1px; background:var(--hairline);}

  footer{margin-top:auto; padding:16px 20px 24px; font-family:var(--mono); font-size:10px; color:var(--text-dim); text-align:center; border-top:1px solid var(--hairline);}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="nexus-auth.js"></script>
</head>
<body>
<div class="phone">
  <div class="header">
    <a href="index.html" class="menu-btn">☰ Menu</a>
    <div class="eyebrow">NEXUS · Planogrammes</div>
    <div class="title">Planogramme Manuel</div>
    <div class="subtitle">Comptez vous-même les facings — le calcul se fait ici, sans IA</div>
    <span class="badge-noia">✓ 100% règles · aucun appel externe · gratuit</span>
  </div>
  <div class="divider"></div>

  <div class="section">
    <div class="section-label">Marques observées</div>
    <div id="rows"></div>
    <button class="btn btn-secondary" id="addRow">+ Ajouter une marque</button>

    <div class="constraint-box">
      <label>Contrainte fournisseur de cette vitrine</label>
      <select id="contrainteType">
        <option value="libre">Libre (optimisation par performance uniquement)</option>
        <option value="prioritaire">Prioritaire — un fournisseur passe devant, sans exclusivité</option>
        <option value="exclusif">Exclusif — seul un fournisseur, les autres restent au minimum</option>
      </select>
      <input type="text" id="fournisseurNom" placeholder="Nom du fournisseur (ex: Heineken Group)" style="display:none;">
    </div>

    <button class="btn btn-primary" id="calculer">Calculer la proposition</button>
    <div id="resultsBox"></div>
  </div>

  <footer>NEXUS Planogramme Manuel v1 · Données réelles rayon Bières S1 2026</footer>
</div>

<script>
nexusRequireAuth().then(employee => {
  if (!employee) return; // nexus-auth.js gère déjà la redirection vers NEXUS-Login-v1.html
  if (employee.role !== 'manager' && employee.role !== 'gerant') {
    document.body.innerHTML = '<div style="padding:60px 20px; text-align:center; color:var(--text-dim); font-family:sans-serif;">Cet écran est réservé aux managers.</div>';
    return;
  }

  const SYNTHESE = [{"Article": "BIERE PITON 27.5 CL", "CA_T1": 359.34, "CA_T2": 225.78, "CA_S1": 585.12}, {"Article": "BUZZ VODKA CAN extra strong 10% Plus 250ml -24P", "CA_T1": 49.8, "CA_T2": 36.0, "CA_S1": 85.8}, {"Article": "Biere BUZZ cranberry mur rouge 10% 275ml -24P", "CA_T1": 30.03, "CA_T2": 47.19, "CA_S1": 77.22}, {"Article": "Biere BUZZ extra strong 10% Plus 275ml -24P", "CA_T1": 1158.3, "CA_T2": 1068.21, "CA_S1": 2226.51}, {"Article": "Biere Bavaria 8/6 Blonde 50cl -24P", "CA_T1": 1333.99, "CA_T2": 833.34, "CA_S1": 2167.33}, {"Article": "Biere Bavaria 8/6 RED 50cl - P24", "CA_T1": 665.38, "CA_T2": 684.76, "CA_S1": 1350.14}, {"Article": "Biere Buzz Vodka Peche 275ML - 24P", "CA_T1": 257.4, "CA_T2": 338.91, "CA_S1": 596.31}, {"Article": "Biere Desperados 33cl -24P", "CA_T1": 2740.26, "CA_T2": 2563.68, "CA_S1": 5303.94}, {"Article": "Biere Desperados 33cl Berries -24P", "CA_T1": 177.38, "CA_T2": 238.92, "CA_S1": 416.3}, {"Article": "Biere Desperados 33cl SUN CERISE -24P", "CA_T1": 0.0, "CA_T2": 257.02, "CA_S1": 257.02}, {"Article": "Biere Desperados 33cl lime- 24P", "CA_T1": 227.5, "CA_T2": 262.5, "CA_S1": 490.0}, {"Article": "Biere Desperados 33cl mojito -24P", "CA_T1": 640.64, "CA_T2": 615.16, "CA_S1": 1255.8}, {"Article": "Biere Desperados 50cl -24P", "CA_T1": 846.72, "CA_T2": 1134.75, "CA_S1": 1981.47}, {"Article": "Biere Desperados 65cl - 12P", "CA_T1": 63.91, "CA_T2": 209.16, "CA_S1": 273.07}, {"Article": "Biere Desperados RED 33cl -24P", "CA_T1": 2763.15, "CA_T2": 2746.8, "CA_S1": 5509.95}, {"Article": "Biere Desperados RED 50cl - 12 P", "CA_T1": 795.76, "CA_T2": 697.76, "CA_S1": 1493.52}, {"Article": "Biere Desperados RED 65cl - 12P", "CA_T1": 116.2, "CA_T2": 232.4, "CA_S1": 348.6}, {"Article": "Biere Desperados Virgin 33cl -24P", "CA_T1": 58.31, "CA_T2": 92.61, "CA_S1": 150.92}, {"Article": "Biere Desperados Virgin Punch 33cl - 24P", "CA_T1": 92.61, "CA_T2": 99.47, "CA_S1": 192.08}, {"Article": "Biere GUINNESS 27.5 CL - 24P", "CA_T1": 384.13, "CA_T2": 3.59, "CA_S1": 387.72}, {"Article": "Biere GUINNESS 33 CL EXTRA 7.5% - 24P", "CA_T1": 556.45, "CA_T2": 890.32, "CA_S1": 1446.77}, {"Article": "Biere Heineken 0.0 25 cl - 24P", "CA_T1": 176.3, "CA_T2": 148.35, "CA_S1": 324.65}, {"Article": "Biere Heineken 25cl -24P", "CA_T1": 3756.64, "CA_T2": 4008.92, "CA_S1": 7765.56}, {"Article": "Biere Heineken 33cl - 24P", "CA_T1": 1896.3, "CA_T2": 2022.72, "CA_S1": 3919.02}, {"Article": "Biere Heineken 50cl - 24P", "CA_T1": 4626.9, "CA_T2": 5164.32, "CA_S1": 9791.22}, {"Article": "Biere Heineken 65cl - 12P", "CA_T1": 590.48, "CA_T2": 361.12, "CA_S1": 951.6}, {"Article": "Biere Heineken Cannette 33cl -24P", "CA_T1": 455.4, "CA_T2": 354.2, "CA_S1": 809.6}, {"Article": "Biere Leffe 33cl -24P", "CA_T1": 147.06, "CA_T2": 185.76, "CA_S1": 332.82}, {"Article": "Biere Lorraine 25cl - 24P", "CA_T1": 401.94, "CA_T2": 487.2, "CA_S1": 889.14}, {"Article": "Biere Lorraine 33 cl blle -24P", "CA_T1": 533.6, "CA_T2": 593.4, "CA_S1": 1127.0}, {"Article": "Biere Lorraine 50cl -24P", "CA_T1": 2280.0, "CA_T2": 3091.4, "CA_S1": 5371.4}, {"Article": "Biere Royal faxe 5.6% 50cl -24P", "CA_T1": 851.2, "CA_T2": 984.96, "CA_S1": 1836.16}, {"Article": "Biere Skoll 33 cl -24P", "CA_T1": 147.19, "CA_T2": 143.6, "CA_S1": 290.79}, {"Article": "Bi\u00e8re 1664 25cl - 18P", "CA_T1": 103.53, "CA_T2": 95.41, "CA_S1": 198.94}, {"Article": "Bi\u00e8re 1664 50cl - 24P", "CA_T1": 143.6, "CA_T2": 118.47, "CA_S1": 262.07}, {"Article": "Bi\u00e8re Blonde Heineken 4 x 50 cl", "CA_T1": 55.3, "CA_T2": 110.6, "CA_S1": 165.9}, {"Article": "Bi\u00e8re Blonde Lorraine x 4 - 50 cl", "CA_T1": 8.11, "CA_T2": 64.88, "CA_S1": 72.99}, {"Article": "Bi\u00e8re Desperados 33cl Tropical -24P", "CA_T1": 367.5, "CA_T2": 525.0, "CA_S1": 892.5}, {"Article": "Bi\u00e8re Lorraine Ice 5.4% 33cl - 24P", "CA_T1": 41.28, "CA_T2": 0.0, "CA_S1": 41.28}, {"Article": "Bi\u00e8re MACKESON 275ml - 24P", "CA_T1": 369.92, "CA_T2": 429.76, "CA_S1": 799.68}, {"Article": "Bi\u00e8re PELICAN BLONDE 50 CL - 12P", "CA_T1": 47.97, "CA_T2": 55.35, "CA_S1": 103.32}, {"Article": "Bi\u00e8re PELICAN ROUGE 50 CL - 12P", "CA_T1": 0.0, "CA_T2": 123.84, "CA_S1": 123.84}, {"Article": "Bi\u00e8re Pelforth 25cl -24P", "CA_T1": 122.96, "CA_T2": 169.6, "CA_S1": 292.56}, {"Article": "Bi\u00e8re Porter 39 25cl -24P", "CA_T1": 1254.9, "CA_T2": 1436.46, "CA_S1": 2691.36}, {"Article": "Bi\u00e8re Porter 39 50cl - 24P", "CA_T1": 248.82, "CA_T2": 134.42, "CA_S1": 383.24}, {"Article": "Bi\u00e8re Rude Boy Tonic wine Caramel Vanille 275ml - 12P", "CA_T1": 5.99, "CA_T2": 0.0, "CA_S1": 5.99}, {"Article": "Bi\u00e8re Rude Boy Xtrem 12% Vodka 275ml - 24P", "CA_T1": 275.54, "CA_T2": 77.87, "CA_S1": 353.41}, {"Article": "Bi\u00e8re Smirnoff ice 275ml -24P", "CA_T1": 1054.62, "CA_T2": 1107.54, "CA_S1": 2162.16}, {"Article": "Ginger beer SUPERMALT 33cl -24P", "CA_T1": 0.0, "CA_T2": 256.52, "CA_S1": 256.52}, {"Article": "Hard Cider Mordue IPA -18P", "CA_T1": 64.79, "CA_T2": 0.0, "CA_S1": 64.79}, {"Article": "Hard Cider Mordue Original - 18P", "CA_T1": 33.92, "CA_T2": 0.0, "CA_S1": 33.92}, {"Article": "LE COQ cosmo 33CL - 24 p", "CA_T1": 40.6, "CA_T2": 0.0, "CA_S1": 40.6}, {"Article": "Pack Guinness 27.5cl - 6P", "CA_T1": 17.97, "CA_T2": 0.0, "CA_S1": 17.97}, {"Article": "Pack Heineken 00 25cl - 6P", "CA_T1": 11.52, "CA_T2": 0.0, "CA_S1": 11.52}, {"Article": "Pack Heineken 25cl - 6P", "CA_T1": 164.55, "CA_T2": 548.5, "CA_S1": 713.05}, {"Article": "Pack Lorraine 33cl - 6P", "CA_T1": 18.62, "CA_T2": 37.24, "CA_S1": 55.86}, {"Article": "Pack Smirnoff 27.5 cl x 6P", "CA_T1": 62.32, "CA_T2": 46.74, "CA_S1": 109.06}, {"Article": "SANPE GINGER BEER 20 cl - 24P", "CA_T1": 161.88, "CA_T2": 118.08, "CA_S1": 279.96}, {"Article": "Soft Ginger beer BOUT 33cl -24P", "CA_T1": 236.5, "CA_T2": 230.05, "CA_S1": 466.55}, {"Article": "Soft Ginger beer Can 33cl -24P", "CA_T1": 277.22, "CA_T2": 205.41, "CA_S1": 482.63}];
  const MARQUE_FOURNISSEUR = {"heineken":"Heineken Group","desperados":"Heineken Group","lorraine":"Heineken Group"};

  function fournisseurDe(marque){ return MARQUE_FOURNISSEUR[marque.toLowerCase()] || marque; }

  function caEtEvolution(marque){
    const m = marque.toLowerCase();
    const lignes = SYNTHESE.filter(r => r.Article.toLowerCase().includes(m));
    const ca = lignes.reduce((s,r)=>s+r.CA_S1,0);
    const caT1 = lignes.reduce((s,r)=>s+r.CA_T1,0);
    const caT2 = lignes.reduce((s,r)=>s+r.CA_T2,0);
    const evol = caT1 ? (caT2-caT1)/caT1 : 0;
    return {ca, evol};
  }

  function proposerPlanogramme(detections, facingMin, contrainte){
    const fournisseur = contrainte.nom, niveau = contrainte.type;
    const rows = detections.map(d=>{
      const {ca,evol} = caEtEvolution(d.marque);
      const evolBorne = Math.max(-0.3, Math.min(0.3, evol));
      let poids = ca>0 ? ca*(1+evolBorne) : 0;
      const estFournisseur = fournisseur && fournisseurDe(d.marque).toLowerCase()===fournisseur.toLowerCase();
      if(niveau==='exclusif' && !estFournisseur) poids = 0;
      else if(niveau==='prioritaire' && estFournisseur) poids *= 3;
      return {marque:d.marque, facings_actuels:d.facing, ca, evol, poids};
    });
    const total = rows.reduce((s,r)=>s+r.facings_actuels,0);
    const n = rows.length;
    const plancherTotal = facingMin*n;
    if(plancherTotal>=total){
      rows.forEach(r=>r.facings_proposes=facingMin);
    } else {
      const espace = total-plancherTotal;
      const poidsTotal = rows.reduce((s,r)=>s+r.poids,0);
      rows.forEach(r=>r.brut = facingMin + (poidsTotal>0 ? r.poids/poidsTotal*espace : espace/n));
      rows.forEach(r=>r.facings_proposes=Math.floor(r.brut));
      let manquant = total - rows.reduce((s,r)=>s+r.facings_proposes,0);
      const ordre=[...rows].sort((a,b)=>(b.brut-b.facings_proposes)-(a.brut-a.facings_proposes));
      for(let i=0;i<manquant;i++) ordre[i].facings_proposes+=1;
    }
    rows.forEach(r=>r.delta=r.facings_proposes-r.facings_actuels);
    rows.sort((a,b)=>b.facings_proposes-a.facings_proposes);
    return rows;
  }

  const rowsEl = document.getElementById('rows');
  function addRow(marque='', facing=''){
    const div = document.createElement('div');
    div.className = 'row-input';
    div.innerHTML = `<input name="marque" placeholder="Marque (ex: Heineken)" value="${marque}">
      <input name="facing" type="number" min="0" placeholder="Facings" value="${facing}">
      <button class="remove">×</button>`;
    div.querySelector('.remove').onclick = () => div.remove();
    rowsEl.appendChild(div);
  }
  addRow('Heineken'); addRow('Desperados'); addRow('Lorraine');
  document.getElementById('addRow').onclick = () => addRow();

  document.getElementById('contrainteType').addEventListener('change', (e)=>{
    document.getElementById('fournisseurNom').style.display = e.target.value==='libre' ? 'none' : 'block';
  });

  function fmtPct(v){ return (v*100>=0?'+':'') + (v*100).toFixed(0) + '%'; }

  document.getElementById('calculer').onclick = () => {
    const detections = [];
    rowsEl.querySelectorAll('.row-input').forEach(row => {
      const marque = row.querySelector('[name="marque"]').value.trim();
      const facing = parseInt(row.querySelector('[name="facing"]').value);
      if(marque && !isNaN(facing)) detections.push({marque, facing});
    });
    if(detections.length < 2){
      document.getElementById('resultsBox').innerHTML = '<div class="result-card">Ajoutez au moins 2 marques avec leur facing actuel.</div>';
      return;
    }
    const contrainte = {
      type: document.getElementById('contrainteType').value,
      nom: document.getElementById('fournisseurNom').value.trim(),
    };
    const resultat = proposerPlanogramme(detections, 1, contrainte);

    let html = '<div class="section-label">Proposition — espace total conservé</div>';
    resultat.forEach(r => {
      let cls='badge-ok', txt='Stable';
      if(r.delta>=2){cls='badge-warn'; txt=`+${r.delta}`;}
      else if(r.delta<=-2){cls='badge-warn'; txt=`${r.delta}`;}
      else if(r.delta!==0){txt=`${r.delta>0?'+':''}${r.delta}`;}
      const donnee = r.ca>0 ? `CA ${r.ca.toFixed(0)}€ · évolution ${fmtPct(r.evol)}` : `Pas de donnée de vente connue — plancher garanti`;
      html += `<div class="result-card">
        <div class="result-row">
          <div><div class="result-brand">${r.marque}</div><div class="result-facing">${r.facings_actuels} → ${r.facings_proposes} facings · ${donnee}</div></div>
          <span class="badge ${cls}">${txt}</span>
        </div></div>`;
    });
    document.getElementById('resultsBox').innerHTML = html;
  };

});
</script>
</body>
</html>

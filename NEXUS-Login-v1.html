<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — Connexion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0F14; --panel:#141B22; --hairline:#242E38;
    --text:#EDF1F5; --text-mid:#8A96A5; --text-dim:#57626F;
    --cyan:#4FC3D9; --red:#F0575A; --red-dim:#3A1D1F;
    --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:var(--bg); font-family:var(--sans); color:var(--text); min-height:100vh;}
  body{display:flex; justify-content:center; align-items:center;}
  .card{width:100%; max-width:380px; padding:20px;}
  .mark{display:block; text-align:center; font-family:var(--mono); font-weight:700; font-size:13px; letter-spacing:0.16em; color:var(--cyan); margin-bottom:8px;}
  .title{text-align:center; font-size:22px; font-weight:600; margin-bottom:28px;}

  .field{margin-bottom:16px;}
  .field label{font-family:var(--mono); font-size:10.5px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.05em; display:block; margin-bottom:6px;}
  .field input{
    width:100%; background:var(--panel); border:1px solid var(--hairline); border-radius:10px;
    padding:14px; color:var(--text); font-family:var(--sans); font-size:15px;
  }
  .field input:focus{outline:none; border-color:var(--cyan);}
  #pin{font-family:var(--mono); letter-spacing:8px; font-size:20px; text-align:center;}

  .btn{
    width:100%; background:var(--cyan); color:#04141a; border:none; border-radius:10px;
    padding:14px; font-size:15px; font-weight:600; cursor:pointer; margin-top:8px;
  }
  .error{
    display:none; background:var(--red-dim); color:var(--red); border-radius:8px; padding:10px 14px;
    font-size:12.5px; margin-top:14px; text-align:center;
  }
  .note{font-family:var(--mono); font-size:10px; color:var(--text-dim); text-align:center; margin-top:24px; line-height:1.6;}
</style>
</head>
<body>
<div class="card">
  <span class="mark">NEXUS</span>
  <div class="title">Connexion</div>

  <div class="field">
    <label>Prénom</label>
    <input type="text" id="prenom" placeholder="Thomas" autocomplete="off">
  </div>
  <div class="field">
    <label>Code PIN</label>
    <input type="password" id="pin" placeholder="••••" maxlength="4" inputmode="numeric">
  </div>

  <button class="btn" id="connexion">Se connecter</button>
  <div class="error" id="error">Prénom ou code PIN incorrect.</div>

  <div class="note">Vito Sainte-Marie Usine · NEXUS v1<br>Identification simple — pas une authentification sécurisée</div>
</div>

<script>
  const ROSTER = [
  {
    "employe_id": "Frédéric Bragance",
    "nom": "Bragance",
    "prenom": "Frédéric",
    "role": "manager",
    "anniversaire_jour_mois": null,
    "sexe": null,
    "pin_hash": "642016a75af0e5c35df335042260f5eccc9d6de73b7f4cdc6b2772c768fea26d",
    "pin_sel": "e06d2fa6"
  },
  {
    "employe_id": "Thomas Dupont",
    "nom": "Dupont",
    "prenom": "Thomas",
    "role": "pompiste",
    "anniversaire_jour_mois": "25-12",
    "sexe": "homme",
    "pin_hash": "920feb6b59a1f1a59141956afd3dd3b236f1b52b353129c91c2cd99238c94b1f",
    "pin_sel": "b5b2f7d8"
  },
  {
    "employe_id": "Estelle Bragance",
    "nom": "Bragance",
    "prenom": "Estelle",
    "role": "caissier",
    "anniversaire_jour_mois": "08-07",
    "sexe": "femme",
    "pin_hash": "e9b576862d7d0359e0488f0c7b73d91689644d0c0c07e1c6bb5f0f4e38b965f6",
    "pin_sel": "ddec688c"
  }
];

  async function sha256(message) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(message));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  document.getElementById('connexion').addEventListener('click', async () => {
    const prenomSaisi = document.getElementById('prenom').value.trim().toLowerCase();
    const pinSaisi = document.getElementById('pin').value.trim();
    const errorBox = document.getElementById('error');

    const compte = ROSTER.find(e => e.prenom.toLowerCase() === prenomSaisi);
    if (!compte) { errorBox.style.display = 'block'; return; }

    const hashCalcule = await sha256(`${compte.pin_sel}:${pinSaisi}`);
    if (hashCalcule !== compte.pin_hash) { errorBox.style.display = 'block'; return; }

    errorBox.style.display = 'none';
    // Session simple, cote navigateur uniquement — pas de token securise, coherent
    // avec le statut "prototype" de l'objet Employe (voir NEXUS-Core-Engine-Specification-v1.md §10)
    localStorage.setItem('nexus_session', JSON.stringify({
      prenom: compte.prenom, nom: compte.nom, role: compte.role
    }));
    window.location.href = 'NEXUS-App.html';
  });

  document.getElementById('pin').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') document.getElementById('connexion').click();
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — Assignations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="nexus-auth.js"></script>
<style>
  :root{
    --bg:#0B0F14; --panel:#141B22; --panel-raised:#1A222C; --hairline:#242E38;
    --text:#EDF1F5; --text-mid:#8A96A5; --text-dim:#57626F;
    --green:#34D399; --green-dim:#153629;
    --amber:#F5A623; --amber-dim:#3A2E14;
    --red:#F0575A; --red-dim:#3A1D1F;
    --cyan:#4FC3D9;
    --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:var(--bg); font-family:var(--sans); color:var(--text);}
  body{display:flex; justify-content:center; min-height:100vh;}
  .phone{width:100%; max-width:480px; min-height:100vh; display:flex; flex-direction:column; border-left:1px solid var(--hairline); border-right:1px solid var(--hairline);}

  .header{padding:20px 20px 14px;}
  .eyebrow{font-family:var(--mono); font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--cyan);}
  .title{font-size:20px; font-weight:600; margin-top:4px;}
  .divider{height:1px; background:var(--hairline); margin:0 20px;}

  .section{padding:16px 20px;}
  .section-label{font-family:var(--mono); font-size:10.5px; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-dim); margin:14px 0 10px; display:flex; align-items:center; gap:8px;}
  .section-label::after{content:''; flex:1; height:1px; background:var(--hairline);}

  .form-card{background:var(--panel); border:1px solid var(--hairline); border-radius:12px; padding:16px;}
  .field{margin-bottom:12px;}
  .field label{font-family:var(--mono); font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.04em; display:block; margin-bottom:5px;}
  .field select, .field input, .field textarea{
    width:100%; background:var(--panel-raised); border:1px solid var(--hairline); border-radius:8px;
    padding:10px 12px; color:var(--text); font-family:var(--sans); font-size:13px;
  }
  .field textarea{resize:vertical; min-height:56px;}
  .toggle-group{display:flex; gap:8px; margin-bottom:12px;}
  .toggle-btn{
    flex:1; padding:9px; text-align:center; border-radius:8px; border:1px solid var(--hairline);
    background:var(--panel-raised); color:var(--text-mid); font-size:12.5px; font-weight:600; cursor:pointer;
  }
  .toggle-btn.active{border-color:var(--cyan); color:var(--cyan); background:rgba(79,195,217,0.1);}

  .btn-primary{
    width:100%; padding:12px; border:none; border-radius:8px; font-size:13.5px; font-weight:600;
    background:var(--cyan); color:#04141a; cursor:pointer; margin-top:4px;
  }
  .btn-primary:disabled{opacity:0.35; cursor:not-allowed;}
  .msg{font-size:12px; margin-top:10px; text-align:center;}
  .msg.ok{color:var(--green);}
  .msg.err{color:var(--red);}

  .assign-card{background:var(--panel); border:1px solid var(--hairline); border-radius:12px; padding:14px 16px; margin-bottom:10px;}
  .assign-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
  .assign-titre{font-size:13.5px; font-weight:600;}
  .assign-meta{font-family:var(--mono); font-size:10.5px; color:var(--text-dim); margin-top:3px;}
  .assign-note{font-size:12px; color:var(--text-mid); margin-top:8px; font-style:italic;}
  .status-badge{font-family:var(--mono); font-size:9px; padding:3px 8px; border-radius:20px; font-weight:700; white-space:nowrap;}
  .status-assignee{background:var(--panel-raised); color:var(--text-mid);}
  .status-en_cours{background:rgba(79,195,217,0.12); color:var(--cyan);}
  .status-faite{background:var(--amber-dim); color:var(--amber);}
  .status-validee{background:var(--green-dim); color:var(--green);}
  .status-refusee{background:var(--red-dim); color:var(--red);}

  .assign-actions{display:flex; gap:8px; margin-top:10px;}
  .mini-btn{
    flex:1; padding:8px; border-radius:7px; border:1px solid var(--hairline); background:var(--panel-raised);
    color:var(--text); font-size:11.5px; font-weight:600; cursor:pointer;
  }
  .mini-btn.valider{border-color:var(--green); color:var(--green);}
  .mini-btn.refuser{border-color:var(--red); color:var(--red);}

  .reassign-row{display:flex; gap:8px; margin-top:10px;}
  .reassign-row select{flex:1; background:var(--panel-raised); border:1px solid var(--hairline); border-radius:7px; color:var(--text); font-size:11.5px; padding:7px;}

  .empty-note{padding:30px 20px; text-align:center; color:var(--text-dim); font-size:12.5px;}
  .loading{padding:60px 20px; text-align:center; color:var(--text-dim); font-size:13px;}
  .locked{padding:60px 20px; text-align:center; color:var(--text-dim); font-size:13px;}

  footer{margin-top:auto; padding:16px 20px 24px; font-family:var(--mono); font-size:10px; color:var(--text-dim); text-align:center; border-top:1px solid var(--hairline);}
</style>
</head>
<body>
<div class="phone">
  <div class="header">
    <div class="eyebrow">NEXUS · Manager</div>
    <div class="title">Assignations</div>
  </div>
  <div class="divider"></div>

  <div class="section" id="root">
    <div class="loading">Chargement…</div>
  </div>

  <footer>NEXUS Assignations v1 · Vito Sainte-Marie Usine</footer>
</div>

<script>
  const ROLES = [
    { value: 'pompiste',  label: 'Pompiste' },
    { value: 'caissiere', label: 'Caissière' },
    { value: 'renfort',   label: 'Renfort' },
    { value: 'polyvalent',label: 'Polyvalent' },
    { value: 'manager',   label: 'Manager' },
  ];
  const STATUTS = ['assignee','en_cours','faite','validee','refusee'];
  const STATUT_LABEL = { assignee:'Assignée', en_cours:'En cours', faite:'Faite — à valider', validee:'Validée', refusee:'Refusée' };

  let employeeCourant = null;
  let catalogue = [];
  let employesEquipe = [];
  let assignations = [];
  let modeAssignation = 'role'; // 'role' ou 'personne'

  async function chargerCatalogue() {
    const { data, error } = await nexusClient.from('mission_catalog').select('mission_id, titre').eq('actif', true).order('titre');
    if (error) { console.error(error); return []; }
    return data || [];
  }

  async function chargerEquipe() {
    const { data, error } = await nexusClient.from('employees').select('id, nom, role').eq('actif', true).order('nom');
    if (error) { console.error(error); return []; }
    return data || [];
  }

  async function chargerAssignations() {
    const { data, error } = await nexusClient
      .from('mission_assignments')
      .select('*')
      .order('created_at', { ascending: false });
    if (error) { console.error(error); return []; }
    return data || [];
  }

  function nomEmploye(id) {
    const e = employesEquipe.find(x => x.id === id);
    return e ? e.nom : 'Inconnu';
  }

  function titreMission(missionId) {
    const m = catalogue.find(x => x.mission_id === missionId);
    return m ? m.titre : missionId;
  }

  function roleLabel(v) {
    const r = ROLES.find(x => x.value === v);
    return r ? r.label : v;
  }

  function renderRoot() {
    const root = document.getElementById('root');
    root.innerHTML = `
      <div class="form-card">
        <div class="field">
          <label>Mission</label>
          <select id="selMission">
            ${catalogue.map(m => `<option value="${m.mission_id}">${m.titre}</option>`).join('')}
          </select>
        </div>

        <div class="toggle-group">
          <div class="toggle-btn ${modeAssignation==='role'?'active':''}" data-mode="role">À un rôle</div>
          <div class="toggle-btn ${modeAssignation==='personne'?'active':''}" data-mode="personne">À une personne</div>
        </div>

        <div class="field" id="champCible"></div>

        <div class="field">
          <label>Échéance</label>
          <input type="datetime-local" id="champEcheance">
        </div>

        <div class="field">
          <label>Note (optionnel)</label>
          <textarea id="champNote" placeholder="Précision pour la personne assignée..."></textarea>
        </div>

        <button class="btn-primary" id="btnAssigner">Assigner</button>
        <div class="msg" id="msgAssignation"></div>
      </div>

      <div class="section-label">Assignations en cours (${assignations.length})</div>
      <div id="listeAssignations"></div>
    `;

    renderChampCible();
    renderListeAssignations();

    document.querySelectorAll('.toggle-btn').forEach(el => {
      el.addEventListener('click', () => { modeAssignation = el.dataset.mode; renderRoot(); });
    });
    document.getElementById('btnAssigner').addEventListener('click', creerAssignation);
  }

  function renderChampCible() {
    const champ = document.getElementById('champCible');
    if (modeAssignation === 'role') {
      champ.innerHTML = `
        <label>Rôle</label>
        <select id="cibleRole">${ROLES.map(r => `<option value="${r.value}">${r.label}</option>`).join('')}</select>`;
    } else {
      champ.innerHTML = `
        <label>Personne</label>
        <select id="ciblePersonne">${employesEquipe.map(e => `<option value="${e.id}">${e.nom} (${roleLabel(e.role)})</option>`).join('')}</select>`;
    }
  }

  async function creerAssignation() {
    const btn = document.getElementById('btnAssigner');
    const msg = document.getElementById('msgAssignation');
    msg.textContent = '';
    btn.disabled = true;

    const missionId = document.getElementById('selMission').value;
    const echeance = document.getElementById('champEcheance').value;
    const note = document.getElementById('champNote').value.trim();

    const payload = {
      mission_id: missionId,
      assigned_by_employee_id: employeeCourant.id,
      due_at: echeance ? new Date(echeance).toISOString() : null,
      note: note || null,
      status: 'assignee',
    };
    if (modeAssignation === 'role') {
      payload.assigned_to_role = document.getElementById('cibleRole').value;
      payload.assigned_to_employee_id = null;
    } else {
      payload.assigned_to_employee_id = document.getElementById('ciblePersonne').value;
      payload.assigned_to_role = null;
    }

    const { error } = await nexusClient.from('mission_assignments').insert(payload);
    btn.disabled = false;

    if (error) {
      console.error(error);
      msg.textContent = 'Erreur lors de l\u2019assignation, réessayez.';
      msg.className = 'msg err';
      return;
    }

    msg.textContent = 'Mission assignée.';
    msg.className = 'msg ok';
    assignations = await chargerAssignations();
    renderRoot();
  }

  function renderListeAssignations() {
    const el = document.getElementById('listeAssignations');
    if (assignations.length === 0) {
      el.innerHTML = `<div class="empty-note">Aucune assignation pour l'instant.</div>`;
      return;
    }

    el.innerHTML = assignations.map(a => {
      const cible = a.assigned_to_employee_id ? nomEmploye(a.assigned_to_employee_id) : `Rôle : ${roleLabel(a.assigned_to_role)}`;
      const echeance = a.due_at ? new Date(a.due_at).toLocaleString('fr-FR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' }) : 'Pas d\u2019échéance';
      return `
        <div class="assign-card">
          <div class="assign-top">
            <div>
              <div class="assign-titre">${titreMission(a.mission_id)}</div>
              <div class="assign-meta">${cible} · Échéance ${echeance}</div>
            </div>
            <span class="status-badge status-${a.status}">${STATUT_LABEL[a.status]}</span>
          </div>
          ${a.note ? `<div class="assign-note">"${a.note}"</div>` : ''}
          ${a.status === 'faite' ? `
            <div class="assign-actions">
              <button class="mini-btn valider" data-id="${a.id}" data-action="validee">✓ Valider</button>
              <button class="mini-btn refuser" data-id="${a.id}" data-action="refusee">✕ Refuser</button>
            </div>` : ''}
          <div class="reassign-row">
            <select data-reassign-role="${a.id}">
              <option value="">Réaffecter à un rôle…</option>
              ${ROLES.map(r => `<option value="${r.value}">${r.label}</option>`).join('')}
            </select>
            <select data-reassign-personne="${a.id}">
              <option value="">Réaffecter à une personne…</option>
              ${employesEquipe.map(e => `<option value="${e.id}">${e.nom}</option>`).join('')}
            </select>
          </div>
        </div>`;
    }).join('');

    el.querySelectorAll('.mini-btn').forEach(btn => {
      btn.addEventListener('click', () => majStatut(btn.dataset.id, btn.dataset.action));
    });
    el.querySelectorAll('[data-reassign-role]').forEach(sel => {
      sel.addEventListener('change', () => {
        if (sel.value) reassigner(sel.dataset.reassignRole, { assigned_to_role: sel.value, assigned_to_employee_id: null });
      });
    });
    el.querySelectorAll('[data-reassign-personne]').forEach(sel => {
      sel.addEventListener('change', () => {
        if (sel.value) reassigner(sel.dataset.reassignPersonne, { assigned_to_employee_id: sel.value, assigned_to_role: null });
      });
    });
  }

  async function majStatut(id, status) {
    const { error } = await nexusClient.from('mission_assignments').update({ status, updated_at: new Date().toISOString() }).eq('id', id);
    if (error) { console.error(error); alert('Erreur lors de la mise à jour.'); return; }
    assignations = await chargerAssignations();
    renderListeAssignations();
  }

  async function reassigner(id, champs) {
    const { error } = await nexusClient.from('mission_assignments').update({ ...champs, status: 'assignee', updated_at: new Date().toISOString() }).eq('id', id);
    if (error) { console.error(error); alert('Erreur lors de la réaffectation.'); return; }
    assignations = await chargerAssignations();
    renderListeAssignations();
  }

  nexusRequireAuth().then(async employee => {
    if (!employee) return; // nexus-auth.js gère déjà la redirection vers NEXUS-Login-v1.html

    if (employee.role !== 'manager' && employee.role !== 'gerant') {
      document.getElementById('root').innerHTML = `<div class="locked">Cet écran est réservé aux managers.</div>`;
      return;
    }

    employeeCourant = employee;
    [catalogue, employesEquipe, assignations] = await Promise.all([
      chargerCatalogue(), chargerEquipe(), chargerAssignations()
    ]);
    renderRoot();
  });
</script>
</body>
</html>
